<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aiden</title>
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<link rel="icon" type="image/png" sizes="32x32" href="favicon-32.png">
<link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
<link rel="manifest" href="manifest.json">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Aiden">
<meta name="theme-color" content="#24282C">
<script>
(function(){
  try{
    var t = localStorage.getItem('aiden_theme');
    if(t === 'dark' || (!t && window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches)){
      document.documentElement.setAttribute('data-theme','dark');
    }
  }catch(e){}
})();
</script>
<style>
  :root{
    --ink:#1B2430;
    --paper:#F3F6F5;
    --panel:#FFFFFF;
    --line:#DDE3E1;
    --accent:#0F6E5B;
    --accent-soft:#E4F1EC;
    --sat:#2B5FAD;
    --sun:#C0392B;
    --input-bg:#FFF3D6;
    --input-bg-hover:#FFE9B3;
    --plus:#0F6E5B;
    --minus:#C0392B;
    --amber:#E08E00;
    --muted1:#6b7680;
    --muted2:#7a8389;
    --muted3:#8b9298;
    --muted4:#9aa3ac;
    --muted5:#b7bec2;
    --muted5b:#b7c3bf;
    --muted6:#c7cdcb;
    --text2:#54606a;
    --text3:#5a6469;
    --text4:#3d474d;
    --surface2:#EEF2F1;
    --surface3:#FAFBFA;
    --surface-hover:#e2e8e6;
    --border-light:#EDF1EF;
    --danger-bg:#FFE1E1;
    --danger-bg-hover:#FFC9C9;
    --input-border:#E8D48A;
    --live-bg:#D6EEF8;
    --live-bg-hover:#c9e6f4;
    --live-color:#98a3ab;
    --live-border:#B9DCEB;
    --family-text:#1B6E93;
    --accent-hover:#0b5a4a;
    --shadow-soft:rgba(0,0,0,.06);
    font-family:-apple-system,BlinkMacSystemFont,'Apple SD Gothic Neo','Malgun Gothic','Segoe UI',Roboto,'Noto Sans',sans-serif;
  }
  *{box-sizing:border-box;}
  html{background:var(--paper);}
  body,#app{margin:0;color:var(--ink);background:var(--paper);}
  body{min-height:100vh;min-height:100dvh;}
  body{-webkit-user-select:none;user-select:none;-webkit-touch-callout:none;}
  input, textarea, select{-webkit-user-select:auto;user-select:auto;-webkit-touch-callout:default;}
  .mono{font-family:'IBM Plex Mono','SFMono-Regular',Consolas,monospace;font-variant-numeric:tabular-nums;}

  #app{background:var(--paper);padding:20px;min-height:100vh;min-height:100dvh;}

  .header{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px;margin-bottom:12px;}
  .header h1{font-size:19px;font-weight:700;letter-spacing:-0.01em;margin:0;}
  .header .sub{font-size:12px;color:var(--muted1);margin-top:2px;}

  .tab-nav{display:flex;gap:4px;background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:4px;margin-bottom:16px;width:fit-content;}
  .tab-btn{border:none;background:none;padding:8px 16px;border-radius:7px;font-size:13px;font-weight:700;color:var(--muted2);cursor:pointer;}
  .tab-btn.active{background:var(--accent);color:#fff;}
  .tab-btn:hover:not(.active){background:var(--accent-soft);color:var(--accent);}

  .month-nav{display:flex;align-items:center;gap:6px;background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:4px 6px;}
  .month-nav button{border:none;background:none;font-size:15px;cursor:pointer;color:var(--accent);width:28px;height:28px;border-radius:6px;}
  .month-nav button:hover{background:var(--accent-soft);}
  .month-nav .label{font-weight:700;font-size:14px;padding:0 8px;min-width:84px;text-align:center;}

  .top-grid{display:grid;grid-template-columns:1fr 300px;gap:16px;align-items:start;}
  @media(max-width:900px){.top-grid{grid-template-columns:1fr;}}

  .todo-grid{display:flex;align-items:flex-start;gap:0;}
  .todo-panel{flex:0 0 auto;min-width:260px;max-width:75vw;}
  .todo-panel-right{flex:1 1 320px;min-width:280px;}
  .todo-resizer{flex:0 0 auto;width:14px;align-self:stretch;cursor:col-resize;display:flex;align-items:center;justify-content:center;}
  .todo-resizer::after{content:'';width:4px;height:44px;background:var(--line);border-radius:3px;transition:background .15s;}
  .todo-resizer:hover::after, .todo-resizer.dragging::after{background:var(--accent);}
  @media(max-width:900px){
    .todo-grid{flex-direction:column;}
    .todo-panel{width:100% !important;max-width:100%;}
    .todo-resizer{display:none;}
  }

  .card{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:14px 16px;}
  .card h2{font-size:12px;text-transform:uppercase;letter-spacing:.06em;color:var(--muted2);margin:0 0 10px 0;font-weight:700;}

  .table-wrap{overflow-x:auto;border:1px solid var(--line);border-radius:12px;background:var(--panel);}
  table{border-collapse:collapse;width:100%;min-width:980px;font-size:12.5px;}
  thead th{position:sticky;top:0;background:var(--surface2);border-bottom:1px solid var(--line);padding:8px 6px;font-weight:700;color:var(--text4);white-space:nowrap;text-align:center;}
  tbody td{padding:5px 6px;border-bottom:1px solid var(--border-light);text-align:center;white-space:nowrap;}
  tbody tr:hover{background:var(--surface3);}
  tbody tr.weekend-sat .date-cell{color:var(--sat);font-weight:700;}
  tbody tr.weekend-sun .date-cell{color:var(--sun);font-weight:700;}
  .date-cell{font-weight:600;white-space:nowrap;width:100px;display:grid;grid-template-columns:24px 1fr 24px;align-items:center;}
  .date-cell .date-text{text-align:center;}
  .date-cell .family-tag{justify-self:start;}

  input[type=text]:not(.time-input), input[type=password], input[type=number], input[type=date],
  input[type=datetime-local], input[type=search], select:not(.leave-input), textarea{
    background:var(--panel);color:var(--ink);
  }
  html[data-theme="dark"] input[type=date], html[data-theme="dark"] input[type=datetime-local]{color-scheme:dark;}

  select.leave-input, input.time-input{
    border:1px solid var(--input-border);background:var(--input-bg);border-radius:6px;padding:4px 5px;font-size:12.5px;width:100%;text-align:center;
  }
  select.leave-input{width:82px;}
  input.time-input{width:78px;}
  .checkout-cell{display:grid;grid-template-columns:36px auto 36px;align-items:center;white-space:nowrap;}
  .checkout-cell .ot10-badge{justify-self:start;margin-left:4px;}
  .ot10-badge{font-size:8.5px;color:var(--muted3);font-weight:700;white-space:nowrap;flex-shrink:0;}

  /* ---- 요일별 방문자 수 그래프 ---- */
  .visitor-chart{display:flex;align-items:flex-end;justify-content:space-between;gap:4px;margin-top:14px;}
  .visitor-bar-col{display:flex;flex-direction:column;align-items:center;flex:1;min-width:0;}
  .visitor-bar-count{font-size:10.5px;font-weight:700;color:var(--text2);margin-bottom:3px;}
  .visitor-bar-track{width:100%;max-width:24px;height:64px;display:flex;align-items:flex-end;background:var(--surface2);border-radius:4px;overflow:hidden;}
  .visitor-bar-fill{width:100%;background:var(--muted5);border-radius:4px 4px 0 0;min-height:0;transition:height .2s ease;}
  .visitor-bar-fill.today{background:var(--accent);}
  .visitor-bar-label{font-size:9.5px;color:var(--muted3);margin-top:5px;text-align:center;line-height:1.3;font-weight:600;}
  .visitor-bar-label.today{color:var(--accent);font-weight:700;}
  .visitor-cumulative{text-align:right;margin-top:12px;}
  .visitor-cumulative .num{font-size:13px;font-weight:800;color:var(--ink);}
  .visitor-cumulative .lbl{font-size:10px;color:var(--muted3);font-weight:600;margin-right:4px;}
  input.time-input.invalid{border-color:var(--minus);background:var(--danger-bg);}
  select.leave-input:hover, input.time-input:hover{background:var(--input-bg-hover);}
  select.leave-input:focus, input.time-input:focus{outline:2px solid var(--accent);outline-offset:1px;}
  input.time-input.live-preview{background:var(--live-bg);color:var(--family-text);border-color:var(--live-border);}
  input.time-input.live-preview:hover{background:var(--live-bg-hover);}

  .family-cell{background:var(--live-bg) !important;border-radius:4px;font-weight:700;color:var(--family-text);}
  .family-tag{font-size:9px;background:var(--live-bg);color:var(--family-text);border-radius:4px;padding:1px 4px;font-weight:700;vertical-align:middle;margin-left:2px;}

  .diff-pos{color:var(--plus);font-weight:700;}
  .diff-neg{color:var(--minus);font-weight:700;}
  .muted{color:var(--muted5);}

  tfoot td{padding:8px 6px;font-weight:700;background:var(--surface2);border-top:1px solid var(--line);text-align:center;white-space:nowrap;}
  tfoot td.label-cell{text-align:left;}

  .summary-item{display:flex;justify-content:space-between;align-items:baseline;padding:8px 0;border-bottom:1px solid var(--border-light);font-size:13px;}
  .summary-item:last-child{border-bottom:none;}
  .summary-item .label{color:var(--text3);}
  .summary-item .val{font-weight:700;}

  .balance-wrap{margin-top:10px;}
  .balance-track{position:relative;height:10px;border-radius:6px;background:#E7ECEA;overflow:hidden;}
  .balance-fill{position:absolute;top:0;bottom:0;border-radius:6px;transition:width .4s ease;}
  .balance-fill.pos{background:var(--plus);left:50%;}
  .balance-fill.neg{background:var(--minus);right:50%;}
  .balance-center{position:absolute;left:50%;top:-3px;bottom:-3px;width:2px;background:var(--muted6);}
  .balance-label{margin-top:6px;font-size:12px;color:var(--text3);display:flex;justify-content:space-between;}

  .legend{font-size:11px;color:var(--muted3);margin-top:10px;line-height:1.6;}
  .paste-guide{font-size:11.5px;color:var(--muted1);margin-bottom:8px;line-height:1.5;}
  .paste-guide a{color:var(--accent);font-weight:700;text-decoration:none;}
  .paste-guide a:hover{text-decoration:underline;}
  .legend-line{margin-bottom:6px;}
  .legend-line:last-child{margin-bottom:0;}
  .paste-textarea{width:100%;border:1px solid var(--line);border-radius:8px;padding:10px 12px;font-size:12.5px;font-family:'IBM Plex Mono','SFMono-Regular',Consolas,monospace;resize:vertical;}
  .paste-textarea:focus{outline:2px solid var(--accent);outline-offset:1px;}
  .paste-preview{border:1px solid var(--line);border-radius:8px;overflow:hidden;margin-top:10px;}
  .paste-row{display:grid;grid-template-columns:36px 100px 96px 1fr 1fr 68px;gap:6px;align-items:center;padding:6px 8px;border-bottom:1px solid #EEF1F0;font-size:12px;}
  .paste-row:last-child{border-bottom:none;}
  .paste-row.paste-head{background:var(--surface2);font-weight:700;color:var(--text3);}
  .paste-row select, .paste-row input[type=text]{border:1px solid var(--line);border-radius:6px;padding:4px 5px;font-size:12px;width:100%;text-align:center;}
  .paste-ot label{display:flex;align-items:center;gap:3px;font-size:11px;color:var(--text2);white-space:nowrap;cursor:pointer;}
  .paste-hint{font-size:11px;color:var(--muted3);margin-top:6px;line-height:1.5;}
  .legend b{color:var(--text3);}

  .save-flag{font-size:11px;color:var(--accent);opacity:0;transition:opacity .3s;}
  .save-flag.show{opacity:1;}

  .user-chip{display:flex;align-items:center;gap:8px;background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:6px 10px;font-size:12.5px;font-weight:600;}
  .user-chip button{border:none;background:var(--surface2);color:var(--text2);font-size:11px;font-weight:700;border-radius:6px;padding:5px 8px;cursor:pointer;}
  .user-chip button:hover{background:var(--surface-hover);}

  .login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;}
  .login-card{background:var(--panel);border:1px solid var(--line);border-radius:16px;padding:32px 28px;width:100%;max-width:340px;}
  .login-card h1{font-size:20px;margin:0 0 4px 0;}
  .app-version{font-size:11px;color:var(--muted5);font-weight:600;margin-left:6px;vertical-align:middle;}
  .login-card .desc{font-size:12.5px;color:var(--muted1);margin-bottom:20px;line-height:1.5;}
  .login-field{margin-bottom:12px;}
  .login-field label{display:block;font-size:12px;font-weight:700;color:var(--text2);margin-bottom:5px;}
  .login-field input{width:100%;border:1px solid var(--line);border-radius:8px;padding:10px 12px;font-size:14px;}
  .login-field input:focus{outline:2px solid var(--accent);outline-offset:1px;}
  .login-btn{width:100%;border:none;background:var(--accent);color:#fff;font-weight:700;font-size:14px;border-radius:8px;padding:11px 0;cursor:pointer;margin-top:6px;}
  .login-btn:hover{background:var(--accent-hover);}
  .login-btn:disabled{background:var(--muted5b);cursor:default;}
  .login-error{font-size:12.5px;color:var(--minus);margin-top:10px;min-height:16px;}
  .login-switch{font-size:12.5px;color:var(--muted1);margin-top:14px;text-align:center;}
  .login-switch a{color:var(--accent);font-weight:700;text-decoration:none;}
  .login-switch a:hover{text-decoration:underline;}
  .login-hint{font-size:11px;color:var(--muted3);margin-top:16px;line-height:1.6;}

  .btn-primary{border:none;border-radius:7px;padding:8px 14px;font-size:12.5px;font-weight:700;cursor:pointer;background:var(--accent);color:#fff;white-space:nowrap;}
  .btn-primary:hover{background:var(--accent-hover);}
  .btn-primary:disabled{background:var(--muted5b);cursor:default;}
  .btn-secondary{border:none;border-radius:7px;padding:8px 14px;font-size:12.5px;font-weight:700;cursor:pointer;background:var(--surface2);color:var(--text2);white-space:nowrap;}
  .btn-secondary:hover{background:var(--surface-hover);}

  .subtab-nav{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px;align-items:center;}
  .subtab-btn{border:1px solid var(--line);background:var(--panel);padding:7px 14px;border-radius:20px;font-size:12.5px;font-weight:700;color:var(--text2);cursor:pointer;}
  .subtab-btn.active{background:var(--accent);color:#fff;border-color:var(--accent);}
  .subtab-btn.add-new{border-style:dashed;color:var(--accent);background:var(--panel);}
  .subtab-btn{display:inline-flex;align-items:center;gap:6px;}
  .subtab-btn.drag-over{box-shadow:inset 2px 0 0 var(--accent);}
  .subtab-btn.dragging{opacity:0.4;}
  .cat-dot{display:inline-block;width:8px;height:8px;border-radius:50%;flex-shrink:0;}
  .task-header h2{display:flex;align-items:center;gap:7px;}
  .color-picker{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px;}
  .color-swatch{width:22px;height:22px;border-radius:50%;border:2px solid transparent;cursor:pointer;padding:0;}
  .color-swatch.selected{border-color:var(--ink);}
  .cal-filter-nav{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px;}
  .cal-filter-btn{border:1px solid var(--line);background:var(--panel);padding:5px 11px;border-radius:16px;font-size:11.5px;font-weight:700;color:var(--text2);cursor:pointer;display:inline-flex;align-items:center;gap:5px;}
  .cal-filter-btn.active{background:var(--accent-soft);border-color:var(--accent);color:var(--accent);}

  .task-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;gap:8px;flex-wrap:wrap;}
  .task-header h2{margin:0;font-size:15px;text-transform:none;letter-spacing:0;color:var(--ink);}
  .task-header input.title-edit{font-size:14px;font-weight:700;border:1px solid var(--line);border-radius:6px;padding:5px 8px;flex:1;min-width:120px;}
  .task-actions{display:flex;gap:6px;}
  .task-actions button{border:none;background:var(--surface2);color:var(--text2);font-size:11px;font-weight:700;border-radius:6px;padding:6px 10px;cursor:pointer;}
  .task-actions button:hover{background:var(--surface-hover);}
  .task-actions button.danger:hover{background:var(--danger-bg);color:var(--minus);}

  .todo-legend{font-size:11px;color:var(--muted3);margin-bottom:8px;line-height:1.6;}
  .todo-legend .dot{display:inline-block;width:8px;height:8px;border-radius:50%;margin:0 3px 0 8px;vertical-align:middle;}
  .todo-legend .dot.pending{border:1.5px solid var(--muted6);}
  .todo-legend .dot.progress{background:var(--amber);}
  .todo-legend .dot.done{background:var(--accent);}

  .todo-row{display:grid;grid-template-columns:32px 88px 1fr 54px;gap:6px;align-items:center;padding:7px 2px;border-bottom:1px solid #EEF1F0;}
  .todo-row:last-child{border-bottom:none;}
  .todo-row input[type=date]{border:1px solid var(--line);border-radius:6px;padding:5px 4px;font-size:11.5px;width:100%;color:var(--ink);}
  .todo-row input[type=text]{border:1px solid var(--line);border-radius:6px;padding:6px 8px;font-size:12.5px;width:100%;}
  .todo-row input[type=text]:focus, .todo-row input[type=date]:focus{outline:2px solid var(--accent);outline-offset:1px;}
  .todo-due-text{font-size:11px;color:var(--muted1);font-family:'IBM Plex Mono',monospace;}
  .todo-content-text{font-size:12.5px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .todo-content-text.done{color:var(--muted5);text-decoration:line-through;}
  .todo-add-row{border-bottom:2px solid var(--line);margin-bottom:4px;padding-bottom:10px;}
  .todo-empty{font-size:12.5px;color:var(--muted3);padding:10px 2px;}
  .todo-item-actions{display:flex;gap:2px;justify-content:flex-end;}
  .todo-icon-btn{border:none;background:none;color:var(--muted4);cursor:pointer;font-size:13px;width:24px;height:24px;border-radius:5px;line-height:1;}
  .todo-icon-btn:hover{background:var(--surface2);color:var(--ink);}
  .todo-icon-btn.danger:hover{background:var(--danger-bg);color:var(--minus);}

  .status-toggle{width:24px;height:24px;border-radius:50%;border:2px solid var(--muted6);background:var(--panel);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;color:transparent;padding:0;flex-shrink:0;}
  .status-toggle.status-in_progress{background:var(--amber);border-color:var(--amber);color:#fff;}
  .status-toggle.status-done{background:var(--accent);border-color:var(--accent);color:#fff;}

  .new-cat-row{display:flex;gap:8px;}
  .new-cat-row input{flex:1;border:1px solid var(--line);border-radius:8px;padding:8px 12px;font-size:13px;}
  .new-cat-row input:focus{outline:2px solid var(--accent);outline-offset:1px;}

  .note-list{display:flex;flex-direction:column;gap:10px;}
  .note-card{background:var(--panel);border:1px solid var(--line);border-radius:12px;overflow:hidden;transition:box-shadow .15s;}
  .note-card.expanded{box-shadow:0 2px 10px var(--shadow-soft);}
  .note-header{display:flex;align-items:center;gap:10px;padding:13px 16px;cursor:pointer;}
  .note-name{font-weight:700;font-size:14px;color:var(--ink);white-space:nowrap;}
  .note-preview{flex:1;color:var(--muted4);font-size:12.5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;min-width:0;}
  .note-card.expanded .note-header{border-bottom:1px solid var(--line);}
  .note-textarea{width:100%;min-height:220px;border:none;padding:14px 16px;font-size:13.5px;font-family:inherit;resize:vertical;color:var(--ink);}
  .note-textarea:focus{outline:none;background:var(--surface3);}
  .note-flag{border:none;background:none;font-size:15px;cursor:pointer;padding:0;line-height:1;opacity:.28;filter:grayscale(1);flex-shrink:0;}
  .note-flag.pinned{opacity:1;filter:none;}
  .note-delete-btn{border:none;background:var(--danger-bg);color:var(--minus);font-size:11px;font-weight:700;border-radius:6px;padding:6px 10px;cursor:pointer;white-space:nowrap;flex-shrink:0;}
  .note-delete-btn:hover{background:var(--danger-bg-hover);}
  .note-footer{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:10px 16px;border-top:1px solid var(--line);}
  .note-hint{font-size:11px;color:var(--muted4);line-height:1.5;}

  .mini-cal{display:grid;grid-template-columns:repeat(7,1fr);grid-template-rows:24px;grid-auto-rows:62px;row-gap:16px;column-gap:3px;font-size:12.5px;text-align:center;}
  .mini-cal-resizer{height:12px;cursor:row-resize;display:flex;align-items:center;justify-content:center;color:var(--muted6);font-size:12px;letter-spacing:2px;user-select:none;margin-top:2px;}
  .mini-cal-resizer:hover, .mini-cal-resizer.dragging{color:var(--accent);}
  .mini-cal .dow{color:var(--muted3);font-weight:700;padding:4px 0;}
  .mini-cal .day{padding-top:9px;border-radius:7px;cursor:pointer;position:relative;}
  .mini-cal .day:hover{background:var(--accent-soft);}
  .mini-cal .day.selected{background:var(--accent);color:#fff;font-weight:700;}
  .mini-cal .day.today{box-shadow:inset 0 0 0 1.5px var(--accent);}

  class MockQueryBuilder{
    constructor(table){
      this.table = table;
      this.op = 'select';
      this.filters = [];
      this.payload = null;
      this.singleFlag = false;
      this.orderCfg = null;
      this.limitVal = null;
    }
    select(){ return this; }
    eq(col, val){ this.filters.push(r=>r[col]===val); return this; }
    in(col, arr){ this.filters.push(r=>arr.includes(r[col])); return this; }
    gte(col, val){ this.filters.push(r=>r[col]>=val); return this; }
    lte(col, val){ this.filters.push(r=>r[col]<=val); return this; }
    lt(col, val){ this.filters.push(r=>r[col]<val); return this; }
    limit(n){ this.limitVal = n; return this; }
    order(col, opts){ this.orderCfg = { col, asc: !(opts && opts.ascending===false) }; return this; }
    single(){ this.singleFlag = true; return this; }
    insert(payload){ this.op = 'insert'; this.payload = Array.isArray(payload) ? payload : [payload]; return this; }
    update(payload){ this.op = 'update'; this.payload = payload; return this; }
    upsert(payload){ this.op = 'upsert'; this.payload = Array.isArray(payload) ? payload : [payload]; return this; }
    delete(){ this.op = 'delete'; return this; }
    _rows(){ if(!mockDb[this.table]) mockDb[this.table] = []; return mockDb[this.table]; }
    _match(rows){ return rows.filter(r => this.filters.every(f=>f(r))); }
    _run(){
      const rows = this._rows();
      let data = null;
      if(this.op==='select'){
        let out = this._match(rows);
        if(this.orderCfg){
          const { col, asc } = this.orderCfg;
          out = out.slice().sort((a,b)=> (a[col]<b[col] ? -1 : a[col]>b[col] ? 1 : 0) * (asc ? 1 : -1));
        }
        if(this.limitVal!=null) out = out.slice(0, this.limitVal);
        data = out;
      } else if(this.op==='insert'){
        const inserted = this.payload.map(p=>({ id: genMockId(), created_at: new Date().toISOString(), ...p }));
        rows.push(...inserted);
        data = inserted;
      } else if(this.op==='update'){
        const targets = this._match(rows);
        targets.forEach(r=>Object.assign(r, this.payload));
        data = targets;
      } else if(this.op==='upsert'){
        data = this.payload.map(p=>{
          let existing = rows.find(r => r.user_id===p.user_id && r.date_key!==undefined && p.date_key!==undefined && r.date_key===p.date_key);
          if(existing){ Object.assign(existing, p); return existing; }
          const rec = { id: genMockId(), created_at: new Date().toISOString(), ...p };
          rows.push(rec);
          return rec;
        });
      } else if(this.op==='delete'){
        const targets = this._match(rows);
        mockDb[this.table] = rows.filter(r=>!targets.includes(r));
        data = targets;
      }
      saveMockDb();
      if(this.singleFlag) data = Array.isArray(data) ? (data[0] || null) : data;
      return { data, error: null };
    }
    then(resolve){ resolve(this._run()); return Promise.resolve(); }
    catch(){ return this; }
  }

  const PANEL_WIDTH_KEY = 'todo_panel_width';
  function loadTodoPanelWidth(){

  let resizerDragging = false;
  let resizerStartX = 0;
  let resizerStartWidth = 0;
  let resizerWindowListenersAdded = false;

  function ensureResizerWindowListeners(){
    if(resizerWindowListenersAdded) return;
    resizerWindowListenersAdded = true;
    function move(clientX){
      if(!resizerDragging) return;
      const left = document.getElementById('todoPanelLeft');
      const grid = document.getElementById('todoGrid');
      if(!left || !grid) return;
      const delta = clientX - resizerStartX;
      let newWidth = resizerStartWidth + delta;
      const gridWidth = grid.getBoundingClientRect().width;
      const maxW = Math.max(260, gridWidth - 300);
      newWidth = Math.max(260, Math.min(newWidth, maxW));
      left.style.width = newWidth + 'px';
      state.todoPanelWidth = newWidth;
    }
    function endDrag(){
      if(!resizerDragging) return;
      resizerDragging = false;
      const handle = document.getElementById('todoResizer');
      if(handle) handle.classList.remove('dragging');
      document.body.style.userSelect = '';
      saveTodoPanelWidth();
    }
    window.addEventListener('mousemove', e=>move(e.clientX));
    window.addEventListener('mouseup', endDrag);
    window.addEventListener('touchmove', e=>{ if(resizerDragging && e.touches[0]) move(e.touches[0].clientX); }, { passive:true });
    window.addEventListener('touchend', endDrag);
  }

  function attachResizerHandlers(){
    ensureResizerWindowListeners();
    const handle = document.getElementById('todoResizer');
    const left = document.getElementById('todoPanelLeft');

    handle.addEventListener('mousedown', e=>{
      resizerDragging = true;
      resizerStartX = e.clientX;
      resizerStartWidth = left.getBoundingClientRect().width;
      handle.classList.add('dragging');
      document.body.style.userSelect = 'none';
      e.preventDefault();
    });

      if(!e.touches[0]) return;
      resizerDragging = true;
      resizerStartX = e.touches[0].clientX;

  let mcRowDragging = false, mcRowStartY = 0, mcRowStartHeight = 0, mcRowWindowListenersAdded = false;
  function ensureMiniCalRowWindowListeners(){
    if(mcRowWindowListenersAdded) return;
    mcRowWindowListenersAdded = true;
    function move(clientY){
      if(!mcRowDragging) return;
      const el = document.querySelector('.mini-cal');
      if(!el) return;
      let newH = mcRowStartHeight + (clientY - mcRowStartY);
      newH = Math.max(50, Math.min(newH, 240));

      state.miniCalRowHeight = newH;

    function end(){
      if(!mcRowDragging) return;
      mcRowDragging = false;
      const handle = document.getElementById('miniCalResizer');
      if(handle) handle.classList.remove('dragging');
      document.body.style.userSelect = '';
      saveMiniCalRowHeight();
    }
    window.addEventListener('mousemove', e=>move(e.clientY));
    window.addEventListener('mouseup', end);
    window.addEventListener('touchmove', e=>{ if(mcRowDragging && e.touches[0]) move(e.touches[0].clientY); }, { passive:true });
    window.addEventListener('touchend', end);

  function attachMiniCalResizer(){

      handle.classList.add('dragging');
      document.body.style.userSelect = 'none';

  function timeToMin(t){ if(!t) return null; const p = t.split(':'); if(p.length<2) return null; const h=Number(p[0]), mi=Number(p[1]); if(isNaN(h)||isNaN(mi)) return null; return h*60+mi; }
  function isValidTime24(v){ return /^([01][0-9]|2[0-3]):[0-5][0-9]$/.test(v); }
  function minToStr(mins, withSign){
    if(mins===null || mins===undefined || isNaN(mins)) return '';
    const sign = mins<0 ? '-' : (withSign ? '+' : '');
    const abs = Math.round(Math.abs(mins));
    const h = Math.floor(abs/60), m = abs%60;
    return `${sign}${h}:${pad(m)}`;
  }

  function hexToRgb(hex){
    hex = String(hex).replace('#','');
    if(hex.length===3) hex = hex.split('').map(c=>c+c).join('');
    const num = parseInt(hex,16);
    return { r:(num>>16)&255, g:(num>>8)&255, b:num&255 };
  }
  function rgbToHex(r,g,b){
    const c = v=> Math.max(0,Math.min(255,Math.round(v))).toString(16).padStart(2,'0');
    return `#${c(r)}${c(g)}${c(b)}`;
  }
  function adjustColor(hex, amt){
    const { r, g, b } = hexToRgb(hex);
    const f = v => amt>=0 ? v + (255-v)*amt/100 : v + v*amt/100;
    return rgbToHex(f(r), f(g), f(b));
  }
  function relLuminance(hex){
    const { r, g, b } = hexToRgb(hex);
    const lin = v => { v/=255; return v<=0.03928 ? v/12.92 : Math.pow((v+0.055)/1.055, 2.4); };
    return 0.2126*lin(r) + 0.7152*lin(g) + 0.0722*lin(b);
  }
  function hexToHsl(hex){
    const { r, g, b } = hexToRgb(hex);
    const rr=r/255, gg=g/255, bb=b/255;
    const max=Math.max(rr,gg,bb), min=Math.min(rr,gg,bb);
    let h, s, l=(max+min)/2;
    if(max===min){ h=s=0; }
    else{
      const d = max-min;
      s = l>0.5 ? d/(2-max-min) : d/(max+min);
      switch(max){
        case rr: h=(gg-bb)/d+(gg<bb?6:0); break;
        case gg: h=(bb-rr)/d+2; break;
        default: h=(rr-gg)/d+4;
      }
      h/=6;
    }
    return { h: h*360, s: s*100, l: l*100 };
  }
  function hslToHex(h,s,l){
    h=((h%360)+360)%360; s=Math.max(0,Math.min(100,s))/100; l=Math.max(0,Math.min(100,l))/100;
    const c=(1-Math.abs(2*l-1))*s;
    const x=c*(1-Math.abs((h/60)%2-1));
    const m=l-c/2;
    let r,g,b;
    if(h<60){r=c;g=x;b=0;} else if(h<120){r=x;g=c;b=0;} else if(h<180){r=0;g=c;b=x;}
    else if(h<240){r=0;g=x;b=c;} else if(h<300){r=x;g=0;b=c;} else {r=c;g=0;b=x;}
    return rgbToHex((r+m)*255, (g+m)*255, (b+m)*255);
  }
  // 패밀리데이 배경색과 같은 색상(hue)을 유지하면서 명도만 크게 이동시켜 텍스트/테두리 색을 만든다
  function familyTextColor(bg){
    const { h, s, l } = hexToHsl(bg);
    const sat = Math.max(s, 55);
    const targetL = l > 50 ? Math.max(20, l-56) : Math.min(80, l+54);
    return hslToHex(h, sat, targetL);
  }
  function familyBorderColor(bg){
    const { h, s, l } = hexToHsl(bg);
    const sat = Math.max(s, 40);
    const targetL = l > 50 ? Math.max(0, l-25) : Math.min(100, l+30);
    return hslToHex(h, sat, targetL);
  }

  function applyAllColorVars(){
    const theme = getTheme();
    const rootStyle = document.documentElement.style;

    // 배경색
    const bg = getColorItem('bg', theme);
    const panel = adjustColor(bg, theme==='dark' ? 12 : 60);

    rootStyle.setProperty('--accent-soft', theme==='dark' ? adjustColor(accent, -55) : adjustColor(accent, 88));

  }

  function getDayData(dstr){ if(!state.days[dstr]) state.days[dstr] = { leave:'none', checkIn:'', checkOut:'', overtime:false }; return state.days[dstr]; }
  function isFamilyDay(y, m, d){ const dow = new Date(y, m-1, d).getDay(); if(dow !== 5) return false; return Math.ceil(d/7) === 4; }

  function computeDay(dow, data, familyDay){
    const baseWeekdayPlan = planMinutes(dow);
    const isPublicHoliday = data.leave === 'holiday';
    let plan = baseWeekdayPlan;
    if(isPublicHoliday) plan = 0;
    else if(data.leave === 'full') plan = 0;
    else if(data.leave === 'half') plan = Math.max(0, baseWeekdayPlan - 240);
    else if(data.leave === 'quarter') plan = Math.max(0, baseWeekdayPlan - 120);

    const leaveMin = LEAVE_MIN[data.leave || 'none'] || 0; // 월 "근무시간(실제)" 합계 표시용
    const inM = timeToMin(data.checkIn);
    const outM = timeToMin(data.checkOut); // 27:00처럼 24 이상도 그대로 분 단위로 변환됨
    let dur=null, lunch=0, dinner=0, actual=null, overtimeEligible=false, after10pmMin=0;
    if(inM!=null && outM!=null){
      let outAdj = outM < inM ? outM + 24*60 : outM; // "03:00" 같은 소표기는 익일로 자동 보정
      const CAP = 22*60; // 22:00
      overtimeEligible = outAdj > CAP;
      after10pmMin = Math.max(0, outAdj - CAP); // 22시 이후 실제 근무한 시간 (연장신청 체크와 무관하게 퇴근시각 기준)
      if(overtimeEligible && !data.overtime){ outAdj = CAP; } // 연장신청 없으면 22:00까지만 인정
      dur = Math.max(0, outAdj - inM);
      const isWeekdayForLunch = (dow>=1 && dow<=5) && !isPublicHoliday;
      if(isWeekdayForLunch){
        // 평일: 기존과 동일하게 11:30~12:30 중 근무한 만큼만 차감 (체류시간과 무관)
        const overlapStart = Math.max(inM, 11*60+30);
        const overlapEnd = Math.min(outAdj, 12*60+30);
        lunch = Math.max(0, overlapEnd - overlapStart);
      } else {
        // 주말/공휴일: 체류시간 기준 (4:30↑ 30분, 9:00↑ 1시간)
        if(dur >= 9*60) lunch = 60;
        else if(dur >= 4*60+30) lunch = 30;
        else lunch = 0;
      }
      dinner = dur >= (11*60+30) ? 30 : 0;
      const base = dur - lunch - dinner;
      if(familyDay){
        if(base <= 4*60) actual = base + 4*60;
        else if(base <= 8*60) actual = 8*60;
        else actual = base;
      } else { actual = base; }
    }
    // 휴일근로(대체휴일 집계 대상)는 원래 계획근무가 없는 날(주말/공휴일)에 한함.
    // 연차/반차/반반차로 계획근무가 줄어든 것은 별개(초과근무는 그냥 근무 현황에 가산).
    const isCalendarWeekend = (dow === 0 || dow === 6);
    const zeroPlanIsHolidayType = isCalendarWeekend || isPublicHoliday;
    const holidayWork = (zeroPlanIsHolidayType && plan===0 && actual!=null) ? actual : 0;
    const isHolidayWorkDay = zeroPlanIsHolidayType && plan===0 && actual!=null;

    const hasLeaveSelected = data.leave==='full' || data.leave==='half' || data.leave==='quarter';
    const statusCounts = !isHolidayWorkDay && (actual!=null || hasLeaveSelected);
    const dailyDiff = statusCounts ? (actual||0) - plan : 0;
    return { plan, dur, lunch, dinner, actual, leaveMin, holidayWork, statusCounts, dailyDiff, overtimeEligible, after10pmMin };
  }

  // ---------------- 출퇴근 기록 붙여넣기 인식 ----------------

  function parsePasteText(text){
    const lines = text.split(/\r?\n/).map(l=>l.trim()).filter(l=>l.length>0);
    const dateLineRe = /^(\d{4})-(\d{2})-(\d{2})/;
    const blocks = [];
    let current = null;
    for(const line of lines){
      const m = line.match(dateLineRe);
      if(m){
        if(current) blocks.push(current);
        const parts = line.split('\t').map(s=>s.trim()).filter(Boolean);
        current = {
          year: Number(m[1]), month: Number(m[2]), day: Number(m[3]),
          status: parts.length>=2 ? parts[1] : '',
          detailLines: []
        };
      } else if(current){
        current.detailLines.push(line);
      }
    }
    if(current) blocks.push(current);

    const raw = [];
    for(const b of blocks){
      const joined = b.detailLines.join(' ');
      const times = [];
      const timeRe = /([01]?\d|2[0-3]):([0-5]\d)/g;
      let mm;
      while((mm = timeRe.exec(joined)) !== null){
        times.push(pad(Number(mm[1])) + ':' + mm[2]);
      }
      const status = b.status || '';
      let leave = 'none';
      if(status.includes('반반차')) leave = 'quarter';
      else if(status.includes('반차')) leave = 'half';
      else if(status.includes('연차')) leave = 'full';
      else if(status.includes('공휴일')) leave = 'holiday';

      // 상태 텍스트와 무관하게 실제 시간이 있으면 항상 인식 (반차/연차/공휴일이어도 실제 근무 시간이 있을 수 있음)
      const hasRealTime = times.length >= 1 && !(times.length >= 2 && times[0]==='00:00' && times[1]==='00:00');

      // "주휴일"처럼 연차/공휴일도 아니고 실제 근무 시간도 없는 순수 휴무일만 건너뜀
      const isPureRestDay = leave === 'none' && status.includes('휴일') && !hasRealTime;
      if(isPureRestDay) continue;

      raw.push({ year: b.year, month: b.month, day: b.day, status, leave, times, hasRealTime });
    }

    // 붙여넣은 기록 중 가장 최근 날짜를 찾음 - "퇴근 00:00 = 아직 퇴근 안 함" 규칙은 그 날짜에만 적용
    let latestKey = '';
    for(const r of raw){
      const k = dateKey(r.year, r.month, r.day);
      if(k > latestKey) latestKey = k;
    }

    const results = raw.map(r=>{
      const k = dateKey(r.year, r.month, r.day);
      let checkIn = '', checkOut = '';
      if(r.hasRealTime){
        checkIn = r.times[0] || '';
        if(r.times.length >= 2){
          const co = r.times[1];
          if(co === '00:00' && k === latestKey){
            checkOut = ''; // 가장 최근 날짜만 아직 퇴근 안 한 것으로 처리
          } else {
            checkOut = co;
          }
        }
      }
      // 22:00을 넘는 근무인지만 미리 계산해서 미리보기에서 알려줌 (자동으로 체크하지는 않음 - 사용자가 직접 선택)
      let overtimeEligible = false;
      if(checkIn && checkOut){
        const inM = timeToMin(checkIn);
        const rawOutM = timeToMin(checkOut);
        const outAdj = rawOutM < inM ? rawOutM + 24*60 : rawOutM;
        if(outAdj > 22*60) overtimeEligible = true;
      }
      return { year: r.year, month: r.month, day: r.day, status: r.status, leave: r.leave, checkIn, checkOut, overtime: false, overtimeEligible, include: true };
    });

    // 최신 날짜가 먼저 나오는 원문 순서를 날짜 오름차순으로 정렬
    results.sort((a,b)=> dateKey(a.year,a.month,a.day).localeCompare(dateKey(b.year,b.month,b.day)));
    return results;
  }

      const aDone = a.status==='done', bDone = b.status==='done';
      if(aDone !== bDone) return aDone ? 1 : -1;
      if(!a.due_date && !b.due_date) return 0;
      if(!a.due_date) return 1;
      if(!b.due_date) return -1;
      return a.due_date.localeCompare(b.due_date);
    });

  async function loadNotepads(){
    state.notepads = [];

    const { data } = await supabase.from('notepads').select('id,name,content,sort_order,pinned,created_at')
      .eq('user_id', state.user.id).order('sort_order', { ascending:true });
    const all = data || [];

    // 고정(핀)하지 않은 메모장 중 15일이 지난 것은 자동으로 삭제
    const cutoff = Date.now() - NOTE_AUTO_DELETE_DAYS * 24 * 60 * 60 * 1000;
    const expired = all.filter(n => !n.pinned && new Date(n.created_at).getTime() < cutoff);
    const kept = all.filter(n => n.pinned || new Date(n.created_at).getTime() >= cutoff);

    if(expired.length > 0){
      await supabase.from('notepads').delete().in('id', expired.map(n=>n.id));
    }
    state.notepads = kept;
  }

  function computeVisitorChartData(){
    const rows = state.visitAllRows || [];
    const countByDate = {};
    rows.forEach(r=>{ countByDate[r.date_key] = (countByDate[r.date_key]||0) + 1; });
    const days = [];
    for(let i=6; i>=0; i--){
      const d = new Date(todayObj.getFullYear(), todayObj.getMonth(), todayObj.getDate() - i);
      const dk = dateKey(d.getFullYear(), d.getMonth()+1, d.getDate());
      days.push({ date: dk, day: d.getDate(), dow: DOW_LABEL[d.getDay()], count: countByDate[dk] || 0 });
    }
    return { days, cumulativeTotal: rows.length };
  }
  function renderVisitorChart(){
    const { days, cumulativeTotal } = computeVisitorChartData();
    const maxCount = Math.max(1, ...days.map(d=>d.count));
    const barsHtml = days.map(d=>{
      const heightPct = d.count > 0 ? Math.max(8, Math.round((d.count / maxCount) * 100)) : 0;
      const isToday = d.date === dateKey(todayObj.getFullYear(), todayObj.getMonth()+1, todayObj.getDate());
      return `
        <div class="visitor-bar-col">
          <div class="visitor-bar-count">${d.count}</div>
          <div class="visitor-bar-track"><div class="visitor-bar-fill${isToday ? ' today' : ''}" style="height:${heightPct}%;"></div></div>
          <div class="visitor-bar-label${isToday ? ' today' : ''}">${d.dow}<br>${d.day}</div>
        </div>
      `;
    }).join('');
    return `
      <div class="card" style="margin-top:16px;">
        <h2>요일별 방문자 수</h2>
        <div class="visitor-chart">${barsHtml}</div>
        <div class="visitor-cumulative"><span class="lbl">누적 방문자 수</span><span class="num">${cumulativeTotal}</span></div>
      </div>
    `;
  }

  function renderAttendanceHtml(){
    const y = state.year, m = state.month;
    const nDays = daysInMonth(y,m);
    const rows = [];
    let cumulative = 0;
    let totals = { plan:0, dur:0, lunch:0, dinner:0, actual:0, holiday:0, leave:0, after10pm:0 };

    // 이번 달에 22시 이후 근무한 날이 하루라도 있으면, 전체 날짜의 노란 박스를 동일하게 왼쪽으로 이동시켜 정렬을 통일한다
    let monthHasOvertime = false;
    for(let d=1; d<=nDays; d++){
      const dstr0 = dateKey(y,m,d);
      const dow0 = new Date(y, m-1, d).getDay();
      const c0 = computeDay(dow0, effectiveDayData(getDayData(dstr0)), isFamilyDay(y,m,d));
      if(c0.after10pmMin > 0){ monthHasOvertime = true; break; }
    }

    for(let d=1; d<=nDays; d++){
      const dstr = dateKey(y,m,d);
      const dow = new Date(y, m-1, d).getDay();
      const data = getDayData(dstr);
      const effData = effectiveDayData(data);
      const isLive = !!effData._live;
      const famDay = isFamilyDay(y, m, d);
      const c = computeDay(dow, effData, famDay);
      if(c.statusCounts) cumulative += c.dailyDiff;
      totals.plan += c.plan; totals.dur += (c.dur||0); totals.lunch += c.lunch; totals.dinner += c.dinner;
      totals.actual += (c.actual||0); totals.holiday += c.holidayWork; totals.leave += c.leaveMin;
      totals.after10pm += (c.after10pmMin||0);

      const isPublicHoliday = data.leave === 'holiday';
      const rowClass = isPublicHoliday ? 'weekend-sun' : (dow===6 ? 'weekend-sat' : (dow===0 ? 'weekend-sun' : ''));
      const weekdayLabel = DOW_LABEL[dow];
      const tabIn = d*2 - 1, tabOut = d*2;

      rows.push(`
        <tr class="${rowClass}" data-date="${dstr}">
          <td class="date-cell mono"><span></span><span class="date-text">${d}일(${weekdayLabel})</span>${famDay ? '<span class="family-tag">FD</span>' : '<span></span>'}</td>

          <td>
            <div class="checkout-cell">
              <span></span>
              <input class="time-input${isLive ? ' live-preview' : ''}" type="text" inputmode="numeric" placeholder="18:00" maxlength="5" data-field="checkOut" data-date="${dstr}" value="${isLive ? effData.checkOut : (data.checkOut||'')}" tabindex="${tabOut}">
              <span class="ot10-badge">${c.after10pmMin>0 ? `+${formatHoursDecimal(c.after10pmMin)}시간` : ''}</span>
            </div>
          </td>
          <td>${c.overtimeEligible ? `<input type="checkbox" data-field="overtime" data-date="${dstr}" ${data.overtime ? 'checked' : ''}>` : ''}</td>
          <td class="mono">${c.dur!=null ? minToStr(c.dur) : ''}</td>
          <td class="mono">${c.dur!=null ? minToStr(c.lunch) : ''}</td>
          <td class="mono">${c.dur!=null ? minToStr(c.dinner) : ''}</td>
          <td class="mono ${famDay ? 'family-cell' : ''}">${c.actual!=null ? minToStr(c.actual) : ''}</td>
          <td class="mono">${c.holidayWork>0 ? minToStr(c.holidayWork) : ''}</td>
          <td class="mono ${c.statusCounts ? (cumulative>=0?'diff-pos':'diff-neg') : ''}">${c.statusCounts ? minToStr(cumulative, true) : ''}</td>
        </tr>
      `);
    }

    const actualMonthTotal = totals.actual + totals.leave;
    const planMonthTotal = totals.plan;
    const compDays = (totals.holiday/480).toFixed(3);
    let dinnerDaysCount = 0;
    for(let d=1; d<=nDays; d++){
      const dstr2 = dateKey(y,m,d);
      const dow2 = new Date(y, m-1, d).getDay();
      const dd = computeDay(dow2, effectiveDayData(getDayData(dstr2)), isFamilyDay(y,m,d));
      if(dd.dinner>0) dinnerDaysCount++;
    }
    const mealTotal = dinnerDaysCount * MEAL_RATE;
    const balanceMinutes = cumulative;
    const balanceMax = 8*60*3;
    const pct = Math.max(-100, Math.min(100, (balanceMinutes/balanceMax)*100));

    return `
      <div class="top-grid">
        <div>
          <div class="card" style="margin-bottom:12px;">
            <h2>출퇴근 기록 붙여넣기</h2>
            <div class="paste-guide">사내 근태 시스템에서 가져오는 방법: <a href="https://hr.pljec.cloud/" target="_blank" rel="noopener">hr.pljec.cloud</a> 접속 → HSS → 근태수정 신청 → 내용 복사 → 아래에 붙여넣기</div>
            <textarea id="pasteText" class="paste-textarea" rows="6" placeholder="복사한 출퇴근 기록을 여기에 붙여넣으세요"></textarea>
            <div style="display:flex;gap:8px;margin-top:8px;">
              <button class="btn-primary" id="pasteParseBtn">인식하기</button>
              <button class="btn-secondary" id="pasteClearBtn">지우기</button>

            <div id="pastePreviewWrap">${renderPastePreview()}</div>
          </div>
          <div class="table-wrap">
            <table>
              <thead>
                <tr>
                  <th>날짜</th><th>연차or휴일</th><th>계획근무</th><th>출근</th><th>퇴근</th><th>연장신청</th>
                  <th>체류시간</th><th>점심휴게</th><th>저녁휴게</th><th>실제근로</th><th>휴일근로</th><th>근무 현황</th>
                </tr>
              </thead>
              <tbody>${rows.join('')}</tbody>
              <tfoot>
                <tr>
                  <td colspan="2" class="label-cell">합계</td>
                  <td class="mono">${minToStr(totals.plan)}</td>
                  <td></td>
                  <td>${totals.after10pm>0 ? `<span class="ot10-badge" style="width:auto;">+${formatHoursDecimal(totals.after10pm)}시간</span>` : ''}</td>
                  <td></td>
                  <td class="mono">${minToStr(totals.dur)}</td>
                  <td class="mono">${minToStr(totals.lunch)}</td>
                  <td class="mono">${minToStr(totals.dinner)}</td>
                  <td class="mono">${minToStr(totals.actual)}</td>
                  <td class="mono">${minToStr(totals.holiday)}</td>
                  <td></td>
                </tr>
              </tfoot>
            </table>
          </div>
        </div>
        <div>
          <div class="card">
            <h2>정산</h2>
            <div class="summary-item"><span class="label">월 근무시간 (실제)</span><span class="val mono">${minToStr(actualMonthTotal)}</span></div>
            <div class="summary-item"><span class="label">월 근무시간 (계획)</span><span class="val mono">${minToStr(planMonthTotal)}</span></div>
            <div class="summary-item"><span class="label">대체휴일</span><span class="val mono">${compDays}</span></div>
            <div class="summary-item"><span class="label">저녁식대</span><span class="val mono">₩${mealTotal.toLocaleString()}</span></div>
            <div class="balance-wrap">
              <div class="summary-item" style="border:none;padding-bottom:4px;"><span class="label">근무 밸런스</span><span class="val mono ${balanceMinutes>=0?'diff-pos':'diff-neg'}">${minToStr(balanceMinutes, true)}</span></div>
              <div class="balance-track">
                <div class="balance-center"></div>
                ${balanceMinutes>=0
                  ? `<div class="balance-fill pos" style="width:${Math.abs(pct)/2}%;"></div>`
                  : `<div class="balance-fill neg" style="width:${Math.abs(pct)/2}%;"></div>`}
              </div>
              <div class="balance-label"><span>부족</span><span>초과</span></div>
            </div>
          </div>
          <div class="card" style="margin-top:16px;">
            <h2>규칙</h2>
            <div class="legend">${RULE_LINES.map(l=>`<div class="legend-line">· ${l}</div>`).join('')}</div>

  function attachAttendanceHandlers(){
    document.getElementById('prev-month').onclick = async ()=>{
      state.month -= 1; if(state.month<1){ state.month=12; state.year -=1; }
      await loadMonth(); render();
    };
    document.getElementById('next-month').onclick = async ()=>{
      state.month += 1; if(state.month>12){ state.month=1; state.year +=1; }
      await loadMonth(); render();
    };
    document.querySelectorAll('input.time-input').forEach(el=>{
      el.addEventListener('focus', ()=>{ el.select(); });
      el.addEventListener('input', ()=>{
        let v = el.value.replace(/[^0-9]/g,'');
        if(v.length>4) v = v.slice(0,4);
        if(v.length>=3) v = v.slice(0,2)+':'+v.slice(2);
        el.value = v; el.classList.remove('invalid'); el.classList.remove('live-preview');
      });
    });
    document.querySelectorAll('[data-field]').forEach(el=>{
      el.addEventListener('change', async (e)=>{
        const dstr = e.target.getAttribute('data-date');
        const field = e.target.getAttribute('data-field');
        const data = getDayData(dstr);
        if(field === 'overtime'){
          data.overtime = e.target.checked;
          await saveDay(dstr, data);
          render();
          return;
        }
        const val = e.target.value;
        if(field==='checkIn' && val!=='' && !isValidTime24(val)){
          e.target.classList.add('invalid'); return;
        }
        if(field==='checkOut' && val!=='' && !isValidTime24(val)){
          e.target.classList.add('invalid'); return;
        }
        data[field] = val;
        await saveDay(dstr, data);
        render();
      });
    });

    const pasteParseBtn = document.getElementById('pasteParseBtn');
    if(pasteParseBtn){
      pasteParseBtn.addEventListener('click', ()=>{
        const textEl = document.getElementById('pasteText');
        const parsed = parsePasteText(textEl.value);
        state.pastePending = parsed;
        render();
      });
    }
    const pasteClearBtn = document.getElementById('pasteClearBtn');
    if(pasteClearBtn){
      pasteClearBtn.addEventListener('click', ()=>{
        const textEl = document.getElementById('pasteText');
        if(textEl) textEl.value = '';
        state.pastePending = [];
        render();
      });
    }
    document.querySelectorAll('.paste-include').forEach(el=>{
      el.addEventListener('change', e=>{
        state.pastePending[+e.target.dataset.idx].include = e.target.checked;
        render();
      });
    });
    document.querySelectorAll('.paste-leave').forEach(el=>{
      el.addEventListener('change', e=>{
        state.pastePending[+e.target.dataset.idx].leave = e.target.value;
      });
    });
    document.querySelectorAll('.paste-time').forEach(el=>{
      el.addEventListener('input', e=>{
        let v = e.target.value.replace(/[^0-9]/g,'');
        if(v.length>4) v = v.slice(0,4);
        if(v.length>=3) v = v.slice(0,2)+':'+v.slice(2);
        e.target.value = v;
        state.pastePending[+e.target.dataset.idx][e.target.dataset.f] = v;
      });
    });
    document.querySelectorAll('.paste-overtime').forEach(el=>{
      el.addEventListener('change', e=>{
        state.pastePending[+e.target.dataset.idx].overtime = e.target.checked;
      });
    });
    const pasteApplyBtn = document.getElementById('pasteApplyBtn');
    if(pasteApplyBtn){
      pasteApplyBtn.addEventListener('click', async ()=>{
        pasteApplyBtn.disabled = true;
        const toApply = state.pastePending.filter(r=>r.include);
        for(const row of toApply){ await applyPasteRow(row); }
        state.pastePending = state.pastePending.filter(r=>!r.include);
        const textEl = document.getElementById('pasteText');
        if(textEl && state.pastePending.length===0) textEl.value = '';
        render();
      });
    }
  }

          <button class="todo-icon-btn danger" data-ev-cancel="${e.id}" title="취소">×</button>

  function getMultiDayEvents(events, year, month, nDays){
    const monthStart = new Date(year, month-1, 1);
    const monthEnd = new Date(year, month-1, nDays, 23, 59, 59);
    return events
      .filter(e => isoToLocalDateKey(e.start_at) !== isoToLocalDateKey(e.end_at))
      .map(e=>{
        const s = new Date(e.start_at), en = new Date(e.end_at);
        const clipStart = s < monthStart ? monthStart : s;
        const clipEnd = en > monthEnd ? monthEnd : en;
        return { id: e.id, title: e.title, startDay: clipStart.getDate(), endDay: clipEnd.getDate(),
          color: e.category_id ? categoryColor(e.category_id) : NO_CATEGORY_COLOR };
      })
      .filter(e => e.startDay <= e.endDay);
  }

  // 실제로 렌더링된 날짜 칸의 위치를 측정해서 그 위에 정확히 겹치도록 바를 그린다
  // (grid-row/column을 직접 계산하는 방식은 헤더 행 등과 어긋나는 문제가 있어 DOM 측정 방식으로 변경)
  function positionMultiDayBars(){
    const overlay = document.getElementById('mcalBarsOverlay');
    const wrap = document.getElementById('mcalWrap');
    if(!overlay || !wrap || !state.multiDayEventsForRender) { if(overlay) overlay.innerHTML=''; return; }
    const wrapRect = wrap.getBoundingClientRect();
    const barH = 16, barGap = 2;
    const laneByRow = {}; // key: rowTop(px, rounded) -> used lane count tracking via segments list
    const allSegments = [];

    state.multiDayEventsForRender.forEach(ev=>{
      let d = ev.startDay;
      while(d <= ev.endDay){
        const startEl = document.querySelector(`.mini-cal .day[data-day="${d}"]`);
        if(!startEl){ d++; continue; }
        const rowTop = startEl.offsetTop;
        // 같은 행(주)에 있는 마지막 날짜까지 세그먼트 확장
        let segEndDay = d;
        while(segEndDay + 1 <= ev.endDay){
          const nextEl = document.querySelector(`.mini-cal .day[data-day="${segEndDay+1}"]`);
          if(!nextEl || nextEl.offsetTop !== rowTop) break;
          segEndDay++;
        }
        const endEl = document.querySelector(`.mini-cal .day[data-day="${segEndDay}"]`) || startEl;
        allSegments.push({
          left: startEl.offsetLeft, width: (endEl.offsetLeft + endEl.offsetWidth) - startEl.offsetLeft,
          top: startEl.offsetTop + startEl.offsetHeight,
          color: ev.color, title: ev.title, id: ev.id, rowKey: rowTop
        });
        d = segEndDay + 1;
      }
    });

    // 같은 행에서 겹치는 세그먼트는 레인을 나눠 위아래로 쌓음
    const rowLanes = {};
    allSegments.forEach(seg=>{
      if(!rowLanes[seg.rowKey]) rowLanes[seg.rowKey] = [];
      let lane = 0;
      while(rowLanes[seg.rowKey].some(o=> o.lane===lane && !(seg.left+seg.width<=o.left || seg.left>=o.left+o.width))) lane++;
      seg.lane = lane;
      rowLanes[seg.rowKey].push(seg);
    });

    overlay.innerHTML = allSegments.map(seg=>`
      <div class="mcal-bar" style="left:${seg.left}px;width:${seg.width}px;top:${seg.top + seg.lane*(barH+barGap)}px;color:${seg.color};" title="${escapeHtml(seg.title)}">
        <span class="mcal-title">${escapeHtml(seg.title)}</span>
      </div>
    `).join('');
  }

  function renderCalendarPanel(){
    const y = state.calendarYear, m = state.calendarMonth;
    const nDays = daysInMonth(y,m);
    const firstDow = new Date(y, m-1, 1).getDay();
    const todayStr = dateKey(todayObj.getFullYear(), todayObj.getMonth()+1, todayObj.getDate());

    const filterCatId = state.calendarCategoryFilter;
    const visibleEvents = filterCatId ? state.calendarEvents.filter(e=>e.category_id===filterCatId) : state.calendarEvents;

    const multiDayEvents = getMultiDayEvents(visibleEvents, y, m, nDays);
    const multiDayIds = new Set(multiDayEvents.map(e=>e.id));
    state.multiDayEventsForRender = multiDayEvents;

    // 하루짜리 일정은 날짜 칸 안에 위에서부터 "시간 / 제목"으로 표시 (여러 날 일정은 아래 바로 별도 표시)
    const singleDayEventsByDate = {};
    visibleEvents.filter(e=>!multiDayIds.has(e.id)).forEach(e=>{
      const dk = isoToLocalDateKey(e.start_at);
      if(!singleDayEventsByDate[dk]) singleDayEventsByDate[dk] = [];
      const color = e.category_id ? categoryColor(e.category_id) : 'var(--sun)';
      singleDayEventsByDate[dk].push({
        title: e.title,
        color,
        allDay: e.all_day,
        sortKey: new Date(e.start_at).getTime(),
        timeLabel: e.all_day ? '종일' : formatKoreanTime(new Date(e.start_at))
      });
    });
    Object.keys(singleDayEventsByDate).forEach(dk=>{
      singleDayEventsByDate[dk].sort((a,b)=> a.allDay===b.allDay ? a.sortKey-b.sortKey : (a.allDay ? -1 : 1));
    });

    const MAX_DAY_LINES = 3;
    let cells = '';
    for(let i=0;i<firstDow;i++) cells += `<div class="day empty"></div>`;
    for(let d=1; d<=nDays; d++){
      const dstr = dateKey(y,m,d);
      const isSelected = dstr === state.calendarSelectedDate;
      const cls = ['day'];
      if(isSelected) cls.push('selected');
      if(dstr === todayStr) cls.push('today');
      const dayEvents = singleDayEventsByDate[dstr] || [];
      const shown = dayEvents.slice(0, MAX_DAY_LINES);
      const extra = dayEvents.length - shown.length;
      const linesHtml = shown.map(ev=>`
        <div class="day-event-line" style="color:${isSelected ? '#fff' : ev.color};"><span class="det-time">[${escapeHtml(ev.timeLabel)}]</span><span class="det-title">${escapeHtml(ev.title)}</span></div>
      `).join('');
      const moreHtml = extra > 0 ? `<div class="day-event-more">외 ${extra}건</div>` : '';
      cells += `<div class="${cls.join(' ')}" data-date="${dstr}" data-day="${d}"><span class="day-num">${d}</span>${linesHtml}${moreHtml}</div>`;
    }

    const filterTabsHtml = `
      <button class="cal-filter-btn ${!filterCatId ? 'active' : ''}" data-filter="">전체</button>
      ${state.todoCategories.map(c=>`
        <button class="cal-filter-btn ${filterCatId===c.id ? 'active' : ''}" data-filter="${c.id}">
          <span class="cat-dot" style="background:${c.color || NO_CATEGORY_COLOR};"></span>${escapeHtml(c.name)}
        </button>
      `).join('')}
    `;

    const catOptionsHtml = `<option value="">과제 없음</option>` +
      state.todoCategories.map(c=>`<option value="${c.id}">${escapeHtml(c.name)}</option>`).join('');

    const selDate = state.calendarSelectedDate;
    const dayStart = new Date(selDate + 'T00:00:00');
    const dayEnd = new Date(selDate + 'T23:59:59');
    const dayEventsAll = visibleEvents.filter(e=>{
      const s = new Date(e.start_at), en = new Date(e.end_at);
      return s <= dayEnd && en >= dayStart;
    }).sort((a,b)=> new Date(a.start_at) - new Date(b.start_at));

    const allDayEvents = dayEventsAll.filter(e=>e.all_day);

    const allDayHtml = allDayEvents.length > 0 ? `
      <div class="cal-allday-section">
        ${allDayEvents.map(e=>{
          const color = e.category_id ? categoryColor(e.category_id) : NO_CATEGORY_COLOR;
          return `<span class="cal-allday-chip" style="background:${color};" data-event="${e.id}" title="${escapeHtml(e.title)}">종일 · ${escapeHtml(e.title)}${e.location ? ' · '+escapeHtml(e.location) : ''}</span>`;
        }).join('')}
      </div>
    ` : '';

    const listHtml = dayEventsAll.map(e=>calEventListItemHtml(e)).join('') || `<div class="todo-empty">이 날짜에 일정이 없어요.</div>`;

    return `
      <div class="card">
        <h2>캘린더</h2>
        <div class="month-nav" style="width:100%;justify-content:space-between;margin-bottom:10px;">
          <button id="cal-prev-month">‹</button>
          <span class="label mono">${y}년 ${m}월</span>
          <button id="cal-next-month">›</button>
        </div>
        ${state.todoCategories.length > 0 ? `<div class="cal-filter-nav">${filterTabsHtml}</div>` : ''}
        <div class="mcal-wrap" id="mcalWrap">
          <div class="mini-cal" style="grid-auto-rows:${state.miniCalRowHeight}px;">
            ${DOW_LABEL.map(d=>`<div class="dow">${d}</div>`).join('')}
            ${cells}
          </div>
          <div class="mcal-bars-overlay" id="mcalBarsOverlay"></div>
        </div>
        <div class="mini-cal-resizer" id="miniCalResizer" title="드래그해서 날짜 칸 높이 조절">⋯</div>

        ${state.calendarAddFormOpen ? `
        <div class="cal-add-form">
          <button type="button" class="cal-add-form-close" id="evCloseBtn" title="닫기">×</button>
          <div class="cal-add-form-title">${selDate}에 일정 추가</div>
          <div><label>제목</label><input type="text" id="evTitle" placeholder="일정 제목" maxlength="80"></div>
          <div><label>장소</label><input type="text" id="evLocation" placeholder="장소 (선택)" maxlength="80"></div>
          <div><label>과제</label><select id="evCategory">${catOptionsHtml}</select></div>
          <div class="cal-allday-row"><input type="checkbox" id="evAllDay"><label for="evAllDay">종일</label></div>
          <div><label>시작</label><input type="datetime-local" id="evStart"></div>
          <div><label>종료</label><input type="datetime-local" id="evEnd"></div>
          <div class="cal-repeat-row">
            <div><label>반복</label><select id="evRepeat"><option value="none">반복 안 함</option><option value="weekly">매주 같은 요일</option></select></div>
            <div id="evRepeatUntilWrap" style="display:none;"><label>반복 종료일</label><input type="date" id="evRepeatUntil"></div>
          </div>
          <button class="btn-primary" id="evAddBtn">일정 추가</button>
        </div>
        ` : `<button type="button" class="cal-open-add-btn" id="evOpenBtn">+ ${selDate}에 일정 추가</button>`}

        <div class="cal-selected-label">${selDate} 일정</div>
        ${allDayHtml}
        <div class="cal-event-list">${listHtml}</div>
      </div>
    `;
  }

      const expanded = state.notepadExpandedId === n.id;

    const newTaskTabBtn = document.getElementById('newTaskTabBtn');

    document.querySelectorAll('.subtab-btn[data-cat]').forEach(btn=>{
      btn.addEventListener('click', ()=>{
        state.todoActiveCatId = btn.getAttribute('data-cat');
        state.todoCatEditing = null; state.todoItemEditing = null;
        render();
      });
      btn.addEventListener('dragstart', (e)=>{
        dragSrcCatId = btn.getAttribute('data-cat');
        btn.classList.add('dragging');
        if(e.dataTransfer) e.dataTransfer.effectAllowed = 'move';
      });
      btn.addEventListener('dragend', ()=>{
        btn.classList.remove('dragging');
        document.querySelectorAll('.subtab-btn.drag-over').forEach(el=>el.classList.remove('drag-over'));
      });
      btn.addEventListener('dragover', (e)=>{
        e.preventDefault();
        btn.classList.add('drag-over');
      });
      btn.addEventListener('dragleave', ()=>{ btn.classList.remove('drag-over'); });
      btn.addEventListener('drop', async (e)=>{
        e.preventDefault();
        btn.classList.remove('drag-over');
        const targetCatId = btn.getAttribute('data-cat');
        if(!dragSrcCatId || dragSrcCatId === targetCatId) return;
        const ids = state.todoCategories.map(c=>c.id);
        const fromIdx = ids.indexOf(dragSrcCatId);
        const toIdx = ids.indexOf(targetCatId);

          const sDate = evStart.value ? evStart.value.slice(0,10) : state.calendarSelectedDate;
          const eDate = evEnd.value ? evEnd.value.slice(0,10) : state.calendarSelectedDate;
          evStart.type = 'date'; evStart.value = sDate;
          evEnd.type = 'date'; evEnd.value = eDate;
        } else {
          const sDate = evStart.value || state.calendarSelectedDate;
          const eDate = evEnd.value || state.calendarSelectedDate;
          evStart.type = 'datetime-local'; evStart.value = `${sDate}T09:00`;
          evEnd.type = 'datetime-local'; evEnd.value = `${eDate}T10:00`;
        }
      });

      evStart.addEventListener('input', ()=>{
        if(evAllDay.checked || !evStart.value) return;
        const startDt = new Date(evStart.value);
        if(isNaN(startDt.getTime())) return;
        const endDt = new Date(startDt.getTime() + 60*60*1000);
        evEnd.value = `${endDt.getFullYear()}-${pad(endDt.getMonth()+1)}-${pad(endDt.getDate())}T${pad(endDt.getHours())}:${pad(endDt.getMinutes())}`;
      });

      if(evRepeat) evRepeat.addEventListener('change', ()=>{
        evRepeatUntilWrap.style.display = evRepeat.value === 'weekly' ? '' : 'none';
      });

      evAddBtn.addEventListener('click', async ()=>{
        const title = evTitle.value.trim();
        if(!title || !evStart.value || !evEnd.value) return;
        const isAllDay = evAllDay.checked;
        let baseStart, baseEnd, newDate;
        if(isAllDay){
          baseStart = new Date(evStart.value + 'T00:00:00');
          baseEnd = new Date(evEnd.value + 'T23:59:59');
          newDate = evStart.value;
        } else {
          baseStart = new Date(evStart.value);
          baseEnd = new Date(evEnd.value);
          newDate = evStart.value.slice(0,10);
        }

        const WEEK_MS = 7*24*60*60*1000;
        const occurrences = [{ start: baseStart, end: baseEnd }];
        if(evRepeat && evRepeat.value === 'weekly' && evRepeatUntil && evRepeatUntil.value){
          const untilDate = new Date(evRepeatUntil.value + 'T23:59:59');
          let cs = new Date(baseStart.getTime() + WEEK_MS);
          let ce = new Date(baseEnd.getTime() + WEEK_MS);
          while(cs <= untilDate){
            occurrences.push({ start: new Date(cs), end: new Date(ce) });
            cs = new Date(cs.getTime() + WEEK_MS);
            ce = new Date(ce.getTime() + WEEK_MS);
          }
        }

        evAddBtn.disabled = true;
        const locationVal = evLocation.value.trim();
        const categoryVal = evCategory.value || null;
        for(const occ of occurrences){
          await addCalendarEvent(title, locationVal, occ.start.toISOString(), occ.end.toISOString(), isAllDay, categoryVal);
        }
        evAddBtn.disabled = false;

        const [ny, nm] = newDate.split('-').map(Number);
        if(ny !== state.calendarYear || nm !== state.calendarMonth){
          state.calendarYear = ny; state.calendarMonth = nm;
          await loadCalendarEvents();
        }
        state.calendarSelectedDate = newDate;
        state.calendarAddFormOpen = false;
        render();
      });
    }

    document.querySelectorAll('.cal-filter-btn').forEach(btn=>{
      btn.addEventListener('click', ()=>{
        state.calendarCategoryFilter = btn.getAttribute('data-filter') || null;
        render();
      });
    });

    document.querySelectorAll('[data-ev-edit]').forEach(btn=>{
      btn.addEventListener('click', ()=>{ state.calendarEventEditing = btn.getAttribute('data-ev-edit'); render(); });
    });
    document.querySelectorAll('[data-ev-cancel]').forEach(btn=>{
      btn.addEventListener('click', ()=>{ state.calendarEventEditing = null; render(); });
    });
    document.querySelectorAll('[data-ev-delete]').forEach(btn=>{
      btn.addEventListener('click', ()=>{ deleteCalendarEvent(btn.getAttribute('data-ev-delete')); });
    });
    document.querySelectorAll('.ev-edit-allday').forEach(cb=>{
      cb.addEventListener('change', ()=>{
        const row = cb.closest('.cal-event-list-item');
        const startEl = row.querySelector('.ev-edit-start');
        const endEl = row.querySelector('.ev-edit-end');
        if(cb.checked){
          startEl.type = 'date'; startEl.value = startEl.value.slice(0,10);
          endEl.type = 'date'; endEl.value = endEl.value.slice(0,10);
        } else {
          const sDate = startEl.value || state.calendarSelectedDate;
          const eDate = endEl.value || state.calendarSelectedDate;
          startEl.type = 'datetime-local'; startEl.value = `${sDate}T09:00`;
          endEl.type = 'datetime-local'; endEl.value = `${eDate}T10:00`;
        }
      });
    });
    document.querySelectorAll('[data-ev-save]').forEach(btn=>{
      btn.addEventListener('click', async ()=>{
        const id = btn.getAttribute('data-ev-save');
        const row = btn.closest('.cal-event-list-item');
        const title = row.querySelector('.ev-edit-title').value.trim();
        const location = row.querySelector('.ev-edit-location').value.trim();
        const categoryEl = row.querySelector('.ev-edit-category');
        const categoryId = categoryEl ? (categoryEl.value || null) : null;
        const allDay = row.querySelector('.ev-edit-allday').checked;
        const startVal = row.querySelector('.ev-edit-start').value;
        const endVal = row.querySelector('.ev-edit-end').value;
        if(!title || !startVal || !endVal) return;
        let startIso, endIso;
        if(allDay){
          startIso = new Date(startVal + 'T00:00:00').toISOString();
          endIso = new Date(endVal + 'T23:59:59').toISOString();
        } else {
          startIso = new Date(startVal).toISOString();
          endIso = new Date(endVal).toISOString();
        }
        btn.disabled = true;
        await updateCalendarEvent(id, { title, location: location || null, category_id: categoryId, all_day: allDay, start_at: startIso, end_at: endIso });
        await loadCalendarEvents();
        btn.disabled = false;
        state.calendarEventEditing = null;
        render();
      });
    });
  }

  // ---------------- 렌더링: 전체 앱(탭 포함) ----------------

  function renderColorSettingsPanel(){
    if(!state.colorSettingsOpen) return '';
    const rowsHtml = COLOR_ITEMS.map(item => `
      <div class="cs-row" data-color-key="${item.key}">
        <div class="cs-row-label">${item.label}</div>
        <div class="cs-field"><label>라이트</label><input type="color" class="cs-light-input" data-color-key="${item.key}" value="${getColorItem(item.key,'light')}"></div>
        <div class="cs-field"><label>다크</label><input type="color" class="cs-dark-input" data-color-key="${item.key}" value="${getColorItem(item.key,'dark')}"></div>
        <button type="button" class="cs-reset-btn" data-color-reset="${item.key}">기본값</button>
      </div>
    `).join('');
    return `
      <div class="color-settings-panel">
        <div class="cs-title">테마 색상 설정 (라이트 · 다크 모드 각각 지정)</div>
        ${rowsHtml}
      </div>
    `;
  }

  function renderApp(){
    startLiveTick();
    const subLabel = state.tab==='attendance'
      ? '출퇴근 시간을 입력하면 근무 현황이 자동으로 계산돼요'
      : state.tab==='todo'
        ? '과제별로 할 일을 관리하고, 오른쪽 캘린더에 일정을 추가하세요'
        : `메모장을 추가하고 눌러서 내용을 적어보세요 · 만든 지 ${NOTE_AUTO_DELETE_DAYS}일이 지나면 자동으로 삭제돼요. 계속 남겨두고 싶으면 이름 옆 🚩를 눌러 고정하세요`;
    document.getElementById('app').innerHTML = `
      <div class="header">
        <div>
          <h1>Aiden<span class="app-version">${APP_VERSION}</span></h1>
          <div class="sub">${subLabel} · <span id="save-flag" class="save-flag">저장됨</span></div>
        </div>
        <div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap;">
          <button class="theme-toggle" id="colorSettingsBtn" title="테마 색상 설정">🎨</button>
          <button class="theme-toggle" id="themeToggleBtn" title="다크/라이트 모드 전환">${getTheme()==='dark' ? '☀' : '☾'}</button>
          <div class="user-chip">${state.user.name}님 <button id="logoutBtn">로그아웃</button></div>
          ${state.tab==='attendance' ? `
          <div class="month-nav">
            <button id="prev-month">‹</button>
            <span class="label mono">${state.year}년 ${state.month}월</span>
            <button id="next-month">›</button>
          </div>` : ''}
        </div>
      </div>

      ${renderColorSettingsPanel()}

      <div class="tab-nav">
        <button class="tab-btn ${state.tab==='attendance' ? 'active' : ''}" id="tabAttendance">근태 관리</button>
        <button class="tab-btn ${state.tab==='todo' ? 'active' : ''}" id="tabTodo">To do list</button>
        <button class="tab-btn ${state.tab==='notes' ? 'active' : ''}" id="tabNotes">메모장</button>
      </div>

      <div id="tabContent">
        ${state.tab==='attendance' ? renderAttendanceHtml() : state.tab==='todo' ? renderTodoHtml() : renderNotepadHtml()}
      </div>
    `;

    document.getElementById('logoutBtn').onclick = logout;
    document.getElementById('themeToggleBtn').onclick = ()=>{ toggleTheme(); render(); };
    document.getElementById('colorSettingsBtn').onclick = ()=>{ state.colorSettingsOpen = !state.colorSettingsOpen; render(); };
    document.querySelectorAll('.cs-light-input').forEach(el=>{
      el.addEventListener('input', ()=>{ setColorItem(el.getAttribute('data-color-key'), 'light', el.value); });
    });
    document.querySelectorAll('.cs-dark-input').forEach(el=>{
      el.addEventListener('input', ()=>{ setColorItem(el.getAttribute('data-color-key'), 'dark', el.value); });
    });
    document.querySelectorAll('[data-color-reset]').forEach(btn=>{
      btn.addEventListener('click', ()=>{ resetColorItem(btn.getAttribute('data-color-reset')); render(); });
    });
    document.getElementById('tabAttendance').onclick = ()=>{ state.tab='attendance'; render(); };
    document.getElementById('tabTodo').onclick = ()=>{ state.tab='todo'; render(); };
    document.getElementById('tabNotes').onclick = ()=>{ state.tab='notes'; render(); };

    if(state.tab==='attendance') attachAttendanceHandlers();
    else if(state.tab==='todo') attachTodoHandlers();
    else attachNotepadHandlers();
  }

  function captureFocusState(){
    const active = document.activeElement;
    if(!active) return null;
    const tag = active.tagName;
    if(tag !== 'INPUT' && tag !== 'SELECT' && tag !== 'TEXTAREA') return null;
    const dstr = active.getAttribute('data-date');
    const field = active.getAttribute('data-field');
    const id = active.id;
    if(!dstr && !id) return null; // 로그인 화면 등 식별 불가능한 요소는 건드리지 않음
    let selStart = null, selEnd = null;
    if(tag === 'INPUT' && (active.type === 'text' || active.type === 'search')){
      try{ selStart = active.selectionStart; selEnd = active.selectionEnd; }catch(e){}
    }
    return { dstr, field, id, tag, value: active.value, selStart, selEnd };
  }

  function restoreFocusState(info){
    if(!info) return;
    let el = null;
    if(info.dstr && info.field){
      el = document.querySelector(`[data-date="${info.dstr}"][data-field="${info.field}"]`);
    } else if(info.id){
      el = document.getElementById(info.id);
    }
    if(!el) return;
    if((el.tagName === 'INPUT' || el.tagName === 'TEXTAREA') && info.value !== undefined && info.value !== el.value){
      el.value = info.value; // 재렌더링 사이 입력 중이던 값 복원
    }
    el.focus();
    if(info.selStart!=null && el.setSelectionRange){
      try{ el.setSelectionRange(info.selStart, info.selEnd); }catch(e){}
    }
  }

  function render(){
    const focusInfo = state.user ? captureFocusState() : null;
    if(!state.user){
      if(state.authView === 'signup') renderSignup();
      else if(state.authView === 'changepin') renderChangePin();
      else renderLogin();
      return;
    }
    renderApp();
    restoreFocusState(focusInfo);
  }

  (async function init(){
    loadTodoPanelWidth();
    loadMiniCalRowHeight();
    applyAllColorVars();
    const session = loadSession();
    if(session && session.id){
      state.user = session;
      if(session.id === 'local-admin') supabase = createMockSupabaseClient();
      await recordVisit();
        await Promise.all([loadMonth(), loadTodos(), loadCalendarEvents(), loadNotepads(), loadVisitStats()]);
    }
    render();
  })();
})();
</script>
