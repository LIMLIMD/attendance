<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aiden</title>
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<link rel="icon" type="image/png" sizes="32x32" href="favicon-32.png">
<link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
<link rel="manifest" href="manifest.json">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Aiden">
<meta name="theme-color" content="#24282C">
<style>
  :root{
    --ink:#1B2430;
    --paper:#F3F6F5;
    --panel:#FFFFFF;
    --line:#DDE3E1;
    --accent:#0F6E5B;
    --accent-soft:#E4F1EC;
    --sat:#2B5FAD;
    --sun:#C0392B;
    --input-bg:#FFF3D6;
    --input-bg-hover:#FFE9B3;
    --plus:#0F6E5B;
    --minus:#C0392B;
    --amber:#E08E00;
    font-family:-apple-system,BlinkMacSystemFont,'Apple SD Gothic Neo','Malgun Gothic','Segoe UI',Roboto,'Noto Sans',sans-serif;
  }
  *{box-sizing:border-box;}
  body,#app{margin:0;color:var(--ink);}
  .mono{font-family:'IBM Plex Mono','SFMono-Regular',Consolas,monospace;font-variant-numeric:tabular-nums;}

  #app{background:var(--paper);padding:20px;min-height:100vh;}

  .header{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px;margin-bottom:12px;}
  .header h1{font-size:19px;font-weight:700;letter-spacing:-0.01em;margin:0;}
  .header .sub{font-size:12px;color:#6b7680;margin-top:2px;}

  .tab-nav{display:flex;gap:4px;background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:4px;margin-bottom:16px;width:fit-content;}
  .tab-btn{border:none;background:none;padding:8px 16px;border-radius:7px;font-size:13px;font-weight:700;color:#7a8389;cursor:pointer;}
  .tab-btn.active{background:var(--accent);color:#fff;}
  .tab-btn:hover:not(.active){background:var(--accent-soft);color:var(--accent);}

  .month-nav{display:flex;align-items:center;gap:6px;background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:4px 6px;}
  .month-nav button{border:none;background:none;font-size:15px;cursor:pointer;color:var(--accent);width:28px;height:28px;border-radius:6px;}
  .month-nav button:hover{background:var(--accent-soft);}
  .month-nav .label{font-weight:700;font-size:14px;padding:0 8px;min-width:84px;text-align:center;}

  .top-grid{display:grid;grid-template-columns:1fr 300px;gap:16px;align-items:start;}
  @media(max-width:900px){.top-grid{grid-template-columns:1fr;}}

  .todo-grid{display:flex;align-items:flex-start;gap:0;}
  .todo-panel{flex:0 0 auto;min-width:260px;max-width:75vw;}
  .todo-panel-right{flex:1 1 320px;min-width:280px;}
  .todo-resizer{flex:0 0 auto;width:14px;align-self:stretch;cursor:col-resize;display:flex;align-items:center;justify-content:center;}
  .todo-resizer::after{content:'';width:4px;height:44px;background:var(--line);border-radius:3px;transition:background .15s;}
  .todo-resizer:hover::after, .todo-resizer.dragging::after{background:var(--accent);}
  @media(max-width:900px){
    .todo-grid{flex-direction:column;}
    .todo-panel{width:100% !important;max-width:100%;}
    .todo-resizer{display:none;}
  }

  .card{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:14px 16px;}
  .card h2{font-size:12px;text-transform:uppercase;letter-spacing:.06em;color:#7a8389;margin:0 0 10px 0;font-weight:700;}

  .table-wrap{overflow-x:auto;border:1px solid var(--line);border-radius:12px;background:var(--panel);}
  table{border-collapse:collapse;width:100%;min-width:980px;font-size:12.5px;}
  thead th{position:sticky;top:0;background:#EEF2F1;border-bottom:1px solid var(--line);padding:8px 6px;font-weight:700;color:#3d474d;white-space:nowrap;text-align:center;}
  tbody td{padding:5px 6px;border-bottom:1px solid #EDF1EF;text-align:center;white-space:nowrap;}
  tbody tr:hover{background:#FAFBFA;}
  tbody tr.weekend-sat .date-cell{color:var(--sat);font-weight:700;}
  tbody tr.weekend-sun .date-cell{color:var(--sun);font-weight:700;}
  .date-cell{font-weight:600;}

  select.leave-input, input.time-input{
    border:1px solid #E8D48A;background:var(--input-bg);border-radius:6px;padding:4px 5px;font-size:12.5px;width:100%;text-align:center;
  }
  select.leave-input{width:82px;}
  input.time-input{width:78px;}
  input.time-input.invalid{border-color:var(--minus);background:#FFE1E1;}
  select.leave-input:hover, input.time-input:hover{background:var(--input-bg-hover);}
  select.leave-input:focus, input.time-input:focus{outline:2px solid var(--accent);outline-offset:1px;}
  input.time-input.live-preview{background:#D6EEF8;color:#98a3ab;border-color:#B9DCEB;}
  input.time-input.live-preview:hover{background:#c9e6f4;}

  .family-cell{background:#D6EEF8 !important;border-radius:4px;font-weight:700;color:#1B6E93;}
  .family-tag{font-size:9px;background:#D6EEF8;color:#1B6E93;border-radius:4px;padding:1px 4px;font-weight:700;vertical-align:middle;margin-left:2px;}

  .diff-pos{color:var(--plus);font-weight:700;}
  .diff-neg{color:var(--minus);font-weight:700;}
  .muted{color:#b7bec2;}

  tfoot td{padding:8px 6px;font-weight:700;background:#EEF2F1;border-top:1px solid var(--line);text-align:center;white-space:nowrap;}
  tfoot td.label-cell{text-align:left;}

  .summary-item{display:flex;justify-content:space-between;align-items:baseline;padding:8px 0;border-bottom:1px solid #F0F2F1;font-size:13px;}
  .summary-item:last-child{border-bottom:none;}
  .summary-item .label{color:#5a6469;}
  .summary-item .val{font-weight:700;}

  .balance-wrap{margin-top:10px;}
  .balance-track{position:relative;height:10px;border-radius:6px;background:#E7ECEA;overflow:hidden;}
  .balance-fill{position:absolute;top:0;bottom:0;border-radius:6px;transition:width .4s ease;}
  .balance-fill.pos{background:var(--plus);left:50%;}
  .balance-fill.neg{background:var(--minus);right:50%;}
  .balance-center{position:absolute;left:50%;top:-3px;bottom:-3px;width:2px;background:#c7cdcb;}
  .balance-label{margin-top:6px;font-size:12px;color:#5a6469;display:flex;justify-content:space-between;}

  .legend{font-size:11px;color:#8b9298;margin-top:10px;line-height:1.6;}
  .legend b{color:#5a6469;}

  .save-flag{font-size:11px;color:var(--accent);opacity:0;transition:opacity .3s;}
  .save-flag.show{opacity:1;}

  .user-chip{display:flex;align-items:center;gap:8px;background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:6px 10px;font-size:12.5px;font-weight:600;}
  .user-chip button{border:none;background:#EEF2F1;color:#54606a;font-size:11px;font-weight:700;border-radius:6px;padding:5px 8px;cursor:pointer;}
  .user-chip button:hover{background:#e2e8e6;}

  .login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;}
  .login-card{background:var(--panel);border:1px solid var(--line);border-radius:16px;padding:32px 28px;width:100%;max-width:340px;}
  .login-card h1{font-size:20px;margin:0 0 4px 0;}
  .login-card .desc{font-size:12.5px;color:#6b7680;margin-bottom:20px;line-height:1.5;}
  .login-field{margin-bottom:12px;}
  .login-field label{display:block;font-size:12px;font-weight:700;color:#54606a;margin-bottom:5px;}
  .login-field input{width:100%;border:1px solid var(--line);border-radius:8px;padding:10px 12px;font-size:14px;}
  .login-field input:focus{outline:2px solid var(--accent);outline-offset:1px;}
  .login-btn{width:100%;border:none;background:var(--accent);color:#fff;font-weight:700;font-size:14px;border-radius:8px;padding:11px 0;cursor:pointer;margin-top:6px;}
  .login-btn:hover{background:#0b5a4a;}
  .login-btn:disabled{background:#b7c3bf;cursor:default;}
  .login-error{font-size:12.5px;color:var(--minus);margin-top:10px;min-height:16px;}
  .login-switch{font-size:12.5px;color:#6b7680;margin-top:14px;text-align:center;}
  .login-switch a{color:var(--accent);font-weight:700;text-decoration:none;}
  .login-switch a:hover{text-decoration:underline;}
  .login-hint{font-size:11px;color:#8b9298;margin-top:16px;line-height:1.6;}

  .btn-primary{border:none;border-radius:7px;padding:8px 14px;font-size:12.5px;font-weight:700;cursor:pointer;background:var(--accent);color:#fff;white-space:nowrap;}
  .btn-primary:hover{background:#0b5a4a;}
  .btn-primary:disabled{background:#b7c3bf;cursor:default;}
  .btn-secondary{border:none;border-radius:7px;padding:8px 14px;font-size:12.5px;font-weight:700;cursor:pointer;background:#EEF2F1;color:#54606a;white-space:nowrap;}
  .btn-secondary:hover{background:#e2e8e6;}

  .subtab-nav{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px;align-items:center;}
  .subtab-btn{border:1px solid var(--line);background:#fff;padding:7px 14px;border-radius:20px;font-size:12.5px;font-weight:700;color:#54606a;cursor:pointer;}
  .subtab-btn.active{background:var(--accent);color:#fff;border-color:var(--accent);}
  .subtab-btn.add-new{border-style:dashed;color:var(--accent);background:#fff;}

  .task-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;gap:8px;flex-wrap:wrap;}
  .task-header h2{margin:0;font-size:15px;text-transform:none;letter-spacing:0;color:var(--ink);}
  .task-header input.title-edit{font-size:14px;font-weight:700;border:1px solid var(--line);border-radius:6px;padding:5px 8px;flex:1;min-width:120px;}
  .task-actions{display:flex;gap:6px;}
  .task-actions button{border:none;background:#EEF2F1;color:#54606a;font-size:11px;font-weight:700;border-radius:6px;padding:6px 10px;cursor:pointer;}
  .task-actions button:hover{background:#e2e8e6;}
  .task-actions button.danger:hover{background:#FFE1E1;color:var(--minus);}

  .todo-legend{font-size:11px;color:#8b9298;margin-bottom:8px;line-height:1.6;}
  .todo-legend .dot{display:inline-block;width:8px;height:8px;border-radius:50%;margin:0 3px 0 8px;vertical-align:middle;}
  .todo-legend .dot.pending{border:1.5px solid #c7cdcb;}
  .todo-legend .dot.progress{background:var(--amber);}
  .todo-legend .dot.done{background:var(--accent);}

  .todo-row{display:grid;grid-template-columns:32px 88px 1fr 54px;gap:6px;align-items:center;padding:7px 2px;border-bottom:1px solid #EEF1F0;}
  .todo-row:last-child{border-bottom:none;}
  .todo-row input[type=date]{border:1px solid var(--line);border-radius:6px;padding:5px 4px;font-size:11.5px;width:100%;color:var(--ink);}
  .todo-row input[type=text]{border:1px solid var(--line);border-radius:6px;padding:6px 8px;font-size:12.5px;width:100%;}
  .todo-row input[type=text]:focus, .todo-row input[type=date]:focus{outline:2px solid var(--accent);outline-offset:1px;}
  .todo-due-text{font-size:11px;color:#6b7680;font-family:'IBM Plex Mono',monospace;}
  .todo-content-text{font-size:12.5px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .todo-content-text.done{color:#b7bec2;text-decoration:line-through;}
  .todo-empty{font-size:12.5px;color:#8b9298;padding:10px 2px;}
  .todo-item-actions{display:flex;gap:2px;justify-content:flex-end;}
  .todo-icon-btn{border:none;background:none;color:#9aa3a9;cursor:pointer;font-size:13px;width:24px;height:24px;border-radius:5px;line-height:1;}
  .todo-icon-btn:hover{background:#EEF2F1;color:var(--ink);}
  .todo-icon-btn.danger:hover{background:#FFE1E1;color:var(--minus);}

  .status-toggle{width:24px;height:24px;border-radius:50%;border:2px solid #c7cdcb;background:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;color:transparent;padding:0;flex-shrink:0;}
  .status-toggle.status-in_progress{background:var(--amber);border-color:var(--amber);color:#fff;}
  .status-toggle.status-done{background:var(--accent);border-color:var(--accent);color:#fff;}

  .new-cat-row{display:flex;gap:8px;}
  .new-cat-row input{flex:1;border:1px solid var(--line);border-radius:8px;padding:8px 12px;font-size:13px;}
  .new-cat-row input:focus{outline:2px solid var(--accent);outline-offset:1px;}

  .mini-cal{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;font-size:12.5px;text-align:center;}
  .mini-cal .dow{color:#8b9298;font-weight:700;padding:4px 0;}
  .mini-cal .day{padding:9px 0;border-radius:7px;cursor:pointer;position:relative;}
  .mini-cal .day:hover{background:var(--accent-soft);}
  .mini-cal .day.selected{background:var(--accent);color:#fff;font-weight:700;}
  .mini-cal .day.today{box-shadow:inset 0 0 0 1.5px var(--accent);}
  .mini-cal .day.has-event::after{content:'';position:absolute;bottom:3px;left:50%;transform:translateX(-50%);width:5px;height:5px;border-radius:50%;background:var(--sun);}
  .mini-cal .day.selected.has-event::after{background:#fff;}
  .mini-cal .day.empty{visibility:hidden;cursor:default;}

  .cal-add-form{display:flex;flex-direction:column;gap:8px;margin:14px 0;padding-top:14px;border-top:1px solid #F0F2F1;}
  .cal-add-form input[type=text], .cal-add-form input[type=datetime-local], .cal-add-form input[type=date]{
    border:1px solid var(--line);border-radius:6px;padding:8px 10px;font-size:13px;width:100%;
  }
  .cal-add-form input:focus{outline:2px solid var(--accent);outline-offset:1px;}
  .cal-add-form label{font-size:11px;color:#7a8389;font-weight:700;display:block;margin-bottom:3px;}
  .cal-allday-row{display:flex;align-items:center;gap:7px;font-size:12.5px;color:#54606a;}
  .cal-allday-row label{margin:0;font-weight:600;color:#54606a;font-size:12.5px;}

  .cal-selected-label{font-size:13px;font-weight:700;color:#54606a;margin:14px 0 8px 0;}
  .cal-allday-section{margin-bottom:10px;}
  .cal-allday-chip{display:inline-block;background:var(--accent-soft);color:var(--accent);font-size:12px;font-weight:700;border-radius:6px;padding:5px 10px;margin:0 6px 6px 0;}

  .cal-timeline{position:relative;height:1200px;overflow-y:auto;max-height:460px;border:1px solid var(--line);border-radius:8px;background:#fff;}
  .cal-hour-row{position:absolute;left:0;right:0;height:50px;border-top:1px solid #F0F2F1;}
  .cal-hour-label{position:absolute;left:5px;top:-7px;font-size:10px;color:#b7bec2;background:#fff;padding:0 2px;}
  .cal-event-bar{position:absolute;left:50px;right:8px;background:var(--accent);color:#fff;border-radius:7px;padding:4px 8px;font-size:12px;overflow:hidden;box-shadow:0 1px 2px rgba(0,0,0,.15);cursor:pointer;}
  .cal-event-bar .loc{font-size:10.5px;opacity:.85;display:block;}

  .cal-event-list{margin-top:12px;}
  .cal-event-list-item{display:flex;justify-content:space-between;align-items:center;font-size:12.5px;padding:7px 2px;border-bottom:1px solid #EEF1F0;gap:8px;}
  .cal-event-list-item:last-child{border-bottom:none;}
  .cal-event-list-item .meta{color:#6b7680;flex:1;min-width:0;}
  .cal-event-list-item .meta .t{font-weight:700;color:var(--ink);display:block;}
  .cal-event-del{border:none;background:none;color:#c7cdcb;cursor:pointer;font-size:16px;flex-shrink:0;}
  .cal-event-del:hover{color:var(--minus);}
</style>
</head>
<body>

<div id="app"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
(function(){
  const SUPABASE_URL = 'https://tpjxiealovjlmyeqmupq.supabase.co';
  const SUPABASE_ANON_KEY = 'sb_publishable_r5uArNLj0P4TBk8rPUnqqQ_hf-T2ZEC';

  const supabase = (SUPABASE_URL.startsWith('http'))
    ? window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY)
    : null;

  const LEAVE_MIN = { none:0, full:480, half:240, quarter:120, holiday:0 };
  const LEAVE_LABEL = { none:'없음', full:'연차', half:'반차', quarter:'반반차', holiday:'공휴일' };
  const MEAL_RATE = 9000;
  const SESSION_KEY = 'att_session_v1';
  const STATUS_ORDER = ['pending','in_progress','done'];
  const STATUS_ICON = { pending:'', in_progress:'●', done:'✓' };
  const DOW_LABEL = ['일','월','화','수','목','금','토'];

  let state = {
    year: 2026, month: 7, days: {},
    user: null, authView: 'login', loginError: '', signupError: '', changePinError: '',
    tab: 'attendance',
    todoCategories: [], todoItems: [], todoActiveCatId: null, todoCatEditing: null, todoItemEditing: null,
    calendarYear: 2026, calendarMonth: 7, calendarSelectedDate: '', calendarEvents: [], calendarEventEditing: null,
    todoPanelWidth: 340
  };

  const todayObj = new Date();
  state.year = todayObj.getFullYear();
  state.month = todayObj.getMonth() + 1;
  state.calendarYear = state.year;
  state.calendarMonth = state.month;

  function pad(n){ return String(n).padStart(2,'0'); }
  function monthKey(y,m){ return `${y}-${pad(m)}`; }
  function dateKey(y,m,d){ return `${y}-${pad(m)}-${pad(d)}`; }
  function daysInMonth(y,m){ return new Date(y, m, 0).getDate(); }
  state.calendarSelectedDate = dateKey(state.year, state.month, todayObj.getDate());

  function escapeHtml(s){
    return String(s||'').replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
  }
  function toDatetimeLocalValue(iso){
    const d = new Date(iso);
    return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}T${pad(d.getHours())}:${pad(d.getMinutes())}`;
  }

  // ---- To do 탭: 과제/캘린더 패널 폭 조절 ----
  const PANEL_WIDTH_KEY = 'todo_panel_width';
  function loadTodoPanelWidth(){
    try{
      const v = localStorage.getItem(PANEL_WIDTH_KEY);
      if(v){ state.todoPanelWidth = Math.max(260, Math.min(Number(v), 900)); }
    }catch(e){ /* ignore */ }
  }
  function saveTodoPanelWidth(){
    try{ localStorage.setItem(PANEL_WIDTH_KEY, String(Math.round(state.todoPanelWidth))); }catch(e){ /* ignore */ }
  }

  let resizerDragging = false;
  let resizerStartX = 0;
  let resizerStartWidth = 0;
  let resizerWindowListenersAdded = false;

  function ensureResizerWindowListeners(){
    if(resizerWindowListenersAdded) return;
    resizerWindowListenersAdded = true;
    function move(clientX){
      if(!resizerDragging) return;
      const left = document.getElementById('todoPanelLeft');
      const grid = document.getElementById('todoGrid');
      if(!left || !grid) return;
      const delta = clientX - resizerStartX;
      let newWidth = resizerStartWidth + delta;
      const gridWidth = grid.getBoundingClientRect().width;
      const maxW = Math.max(260, gridWidth - 300);
      newWidth = Math.max(260, Math.min(newWidth, maxW));
      left.style.width = newWidth + 'px';
      state.todoPanelWidth = newWidth;
    }
    function endDrag(){
      if(!resizerDragging) return;
      resizerDragging = false;
      const handle = document.getElementById('todoResizer');
      if(handle) handle.classList.remove('dragging');
      document.body.style.userSelect = '';
      saveTodoPanelWidth();
    }
    window.addEventListener('mousemove', e=>move(e.clientX));
    window.addEventListener('mouseup', endDrag);
    window.addEventListener('touchmove', e=>{ if(resizerDragging && e.touches[0]) move(e.touches[0].clientX); }, { passive:true });
    window.addEventListener('touchend', endDrag);
  }

  function attachResizerHandlers(){
    ensureResizerWindowListeners();
    const handle = document.getElementById('todoResizer');
    const left = document.getElementById('todoPanelLeft');
    if(!handle || !left) return;
    handle.addEventListener('mousedown', e=>{
      resizerDragging = true;
      resizerStartX = e.clientX;
      resizerStartWidth = left.getBoundingClientRect().width;
      handle.classList.add('dragging');
      document.body.style.userSelect = 'none';
      e.preventDefault();
    });
    handle.addEventListener('touchstart', e=>{
      if(!e.touches[0]) return;
      resizerDragging = true;
      resizerStartX = e.touches[0].clientX;
      resizerStartWidth = left.getBoundingClientRect().width;
      handle.classList.add('dragging');
    }, { passive:true });
  }
  function timeToMin(t){ if(!t) return null; const p = t.split(':'); if(p.length<2) return null; const h=Number(p[0]), mi=Number(p[1]); if(isNaN(h)||isNaN(mi)) return null; return h*60+mi; }
  function isValidTime24(v){ return /^([01][0-9]|2[0-3]):[0-5][0-9]$/.test(v); }
  function minToStr(mins, withSign){
    if(mins===null || mins===undefined || isNaN(mins)) return '';
    const sign = mins<0 ? '-' : (withSign ? '+' : '');
    const abs = Math.round(Math.abs(mins));
    const h = Math.floor(abs/60), m = abs%60;
    return `${sign}${h}:${pad(m)}`;
  }
  function planMinutes(dow){ return (dow>=1 && dow<=5) ? 480 : 0; }
  function nowTimeStr(){ const n = new Date(); return pad(n.getHours()) + ':' + pad(n.getMinutes()); }
  function effectiveDayData(data){
    if(data.checkIn && !data.checkOut){ return { leave: data.leave, checkIn: data.checkIn, checkOut: nowTimeStr(), _live: true }; }

  async function login(name, pin){
    if(!supabase) return { ok:false, message:'Supabase 연결 정보가 설정되지 않았어요.' };
    if(!name){ return { ok:false, message:'이름을 입력해주세요.' }; }
    if(!/^\d{4}$/.test(pin)){ return { ok:false, message:'PIN은 숫자 4자리로 입력해주세요.' }; }
    const { data: existing, error } = await supabase.from('att_users').select('id,name,pin').eq('name', name).limit(1);
    if(error) return { ok:false, message:'서버 연결에 실패했어요. 잠시 후 다시 시도해주세요.' };
    if(!existing || existing.length === 0) return { ok:false, message:'등록되지 않은 이름이에요. 아래 "회원가입"으로 먼저 계정을 만들어주세요.' };
    const row = existing[0];
    if(row.pin !== pin) return { ok:false, message:'PIN이 올바르지 않아요.' };
    return { ok:true, user:{ id: row.id, name: row.name } };
  }

  async function register(name, pin, pinConfirm){
    if(!supabase) return { ok:false, message:'Supabase 연결 정보가 설정되지 않았어요.' };
    if(!name){ return { ok:false, message:'이름을 입력해주세요.' }; }
    if(!/^\d{4}$/.test(pin)){ return { ok:false, message:'PIN은 숫자 4자리로 입력해주세요.' }; }
    if(pin !== pinConfirm){ return { ok:false, message:'PIN이 서로 일치하지 않아요. 다시 확인해주세요.' }; }
    const { data: existing, error } = await supabase.from('att_users').select('id').eq('name', name).limit(1);
    if(error) return { ok:false, message:'서버 연결에 실패했어요. 잠시 후 다시 시도해주세요.' };
    if(existing && existing.length > 0) return { ok:false, message:'이미 사용 중인 이름이에요. 동명이인이라면 이름을 다르게 등록해주세요 (예: 홍길동2).' };
    const { data: created, error: insErr } = await supabase.from('att_users').insert({ name, pin }).select('id,name').single();
    if(insErr) return { ok:false, message:'계정 생성에 실패했어요.' };
    return { ok:true, user:{ id: created.id, name: created.name } };
  }

  async function changePin(name, oldPin, newPin, newPinConfirm){
    if(!supabase) return { ok:false, message:'Supabase 연결 정보가 설정되지 않았어요.' };
    if(!name){ return { ok:false, message:'이름을 입력해주세요.' }; }
    if(!/^\d{4}$/.test(oldPin)){ return { ok:false, message:'기존 PIN은 숫자 4자리로 입력해주세요.' }; }
    if(!/^\d{4}$/.test(newPin)){ return { ok:false, message:'변경할 PIN은 숫자 4자리로 입력해주세요.' }; }
    if(newPin !== newPinConfirm){ return { ok:false, message:'변경할 PIN이 서로 일치하지 않아요.' }; }
    if(oldPin === newPin){ return { ok:false, message:'기존 PIN과 다른 값으로 설정해주세요.' }; }
    const { data: existing, error } = await supabase.from('att_users').select('id,pin').eq('name', name).limit(1);
    if(error) return { ok:false, message:'서버 연결에 실패했어요.' };
    if(!existing || existing.length === 0) return { ok:false, message:'등록되지 않은 이름이에요.' };
    const row = existing[0];
    if(row.pin !== oldPin) return { ok:false, message:'기존 PIN이 올바르지 않아요.' };
    const { error: updErr } = await supabase.from('att_users').update({ pin: newPin }).eq('id', row.id);
    if(updErr) return { ok:false, message:'PIN 변경에 실패했어요.' };
    return { ok:true, user:{ id: row.id, name } };
  }

  async function loadMonth(){
    state.days = {};
    if(!supabase || !state.user) return;
    const first = dateKey(state.year, state.month, 1);
    const last = dateKey(state.year, state.month, daysInMonth(state.year, state.month));

      .eq('user_id', state.user.id).gte('date_key', first).lte('date_key', last);
    if(!error && data){ data.forEach(row=>{ state.days[row.date_key] = { leave: row.leave, checkIn: row.check_in || '', checkOut: row.check_out || '' }; }); }
  }

  async function saveDay(dstr, data){
    if(!supabase || !state.user) return;
    const { error } = await supabase.from('att_days').upsert({
      user_id: state.user.id, date_key: dstr, leave: data.leave,
      check_in: data.checkIn, check_out: data.checkOut, updated_at: new Date().toISOString()
    }, { onConflict: 'user_id,date_key' });
    if(!error) flashSave(); else console.error('save failed', error);
  }

  function getDayData(dstr){ if(!state.days[dstr]) state.days[dstr] = { leave:'none', checkIn:'', checkOut:'' }; return state.days[dstr]; }
  function isFamilyDay(y, m, d){ const dow = new Date(y, m-1, d).getDay(); if(dow !== 5) return false; return Math.ceil(d/7) === 4; }

  function computeDay(dow, data, familyDay){
    const isPublicHoliday = data.leave === 'holiday';
    const plan = isPublicHoliday ? 0 : planMinutes(dow);
    const leaveMin = LEAVE_MIN[data.leave || 'none'] || 0;
    const inM = timeToMin(data.checkIn);
    const outM = timeToMin(data.checkOut);
    let dur=null, lunch=0, dinner=0, actual=null;
    if(inM!=null && outM!=null){
      dur = outM - inM;
      if(dur < 0) dur += 24*60;
      const outAdj = outM < inM ? outM + 24*60 : outM;
      const overlapStart = Math.max(inM, 11*60+30);
      const overlapEnd = Math.min(outAdj, 12*60+30);
      lunch = Math.max(0, overlapEnd - overlapStart);
      dinner = dur >= (11*60+30) ? 30 : 0;
      const base = dur - lunch - dinner;
      if(familyDay){
        if(base <= 4*60) actual = base + 4*60;
        else if(base <= 8*60) actual = 8*60;
        else actual = base;
      } else { actual = base; }
    }
    const holidayWork = (plan===0 && actual!=null) ? actual : 0;
    const isHolidayWorkDay = plan===0 && actual!=null;
    const statusCounts = !isHolidayWorkDay && (actual!=null || leaveMin>0);
    const dailyDiff = statusCounts ? (actual||0) + leaveMin - plan : 0;
    return { plan, dur, lunch, dinner, actual, leaveMin, holidayWork, statusCounts, dailyDiff };
  }

    const { data, error } = await supabase.from('todo_categories')

  function cycleStatus(current){ const idx = STATUS_ORDER.indexOf(current); return STATUS_ORDER[(idx+1) % STATUS_ORDER.length]; }

  function sortedItemsFor(catId){
    return state.todoItems.filter(i=>i.category_id===catId).slice().sort((a,b)=>{
      const aDone = a.status==='done', bDone = b.status==='done';
      if(aDone !== bDone) return aDone ? -1 : 1;
      if(!a.due_date && !b.due_date) return 0;
      if(!a.due_date) return 1;
      if(!b.due_date) return -1;
      return a.due_date.localeCompare(b.due_date);
    });
  }

  function renderAttendanceHtml(){
    const y = state.year, m = state.month;
    const nDays = daysInMonth(y,m);
    const rows = [];
    let cumulative = 0;
    let totals = { plan:0, dur:0, lunch:0, dinner:0, actual:0, holiday:0, leave:0 };

    for(let d=1; d<=nDays; d++){
      const dstr = dateKey(y,m,d);
      const dow = new Date(y, m-1, d).getDay();
      const data = getDayData(dstr);
      const effData = effectiveDayData(data);
      const isLive = !!effData._live;
      const famDay = isFamilyDay(y, m, d);
      const c = computeDay(dow, effData, famDay);
      if(c.statusCounts) cumulative += c.dailyDiff;
      totals.plan += c.plan; totals.dur += (c.dur||0); totals.lunch += c.lunch; totals.dinner += c.dinner;
      totals.actual += (c.actual||0); totals.holiday += c.holidayWork; totals.leave += c.leaveMin;

      const rowClass = dow===6 ? 'weekend-sat' : (dow===0 ? 'weekend-sun' : '');
      const weekdayLabel = DOW_LABEL[dow];
      const tabIn = d*2 - 1, tabOut = d*2;

      rows.push(`
        <tr class="${rowClass}" data-date="${dstr}">
          <td class="date-cell mono">${d}일(${weekdayLabel})${famDay ? ' <span class="family-tag">FD</span>' : ''}</td>
          <td>
            <select class="leave-input" data-field="leave" data-date="${dstr}" tabindex="-1">
              ${Object.keys(LEAVE_MIN).map(k=>`<option value="${k}" ${data.leave===k?'selected':''}>${LEAVE_LABEL[k]}</option>`).join('')}
            </select>
          </td>
          <td class="mono">${c.plan>0 ? minToStr(c.plan) : '<span class="muted">-</span>'}</td>
          <td><input class="time-input" type="text" inputmode="numeric" placeholder="09:00" maxlength="5" data-field="checkIn" data-date="${dstr}" value="${data.checkIn||''}" tabindex="${tabIn}"></td>
          <td><input class="time-input${isLive ? ' live-preview' : ''}" type="text" inputmode="numeric" placeholder="18:00" maxlength="5" data-field="checkOut" data-date="${dstr}" value="${isLive ? effData.checkOut : (data.checkOut||'')}" tabindex="${tabOut}"></td>
          <td class="mono">${c.dur!=null ? minToStr(c.dur) : ''}</td>

    }
    const mealTotal = dinnerDaysCount * MEAL_RATE;

  function attachAttendanceHandlers(){
    document.getElementById('prev-month').onclick = async ()=>{
      state.month -= 1; if(state.month<1){ state.month=12; state.year -=1; }
      await loadMonth(); render();
    };
    document.getElementById('next-month').onclick = async ()=>{
      state.month += 1; if(state.month>12){ state.month=1; state.year +=1; }
      await loadMonth(); render();
    };
    document.querySelectorAll('input.time-input').forEach(el=>{
      el.addEventListener('focus', ()=>{ el.select(); });
      el.addEventListener('input', ()=>{
        let v = el.value.replace(/[^0-9]/g,'');
        if(v.length>4) v = v.slice(0,4);
        if(v.length>=3) v = v.slice(0,2)+':'+v.slice(2);
        el.value = v; el.classList.remove('invalid'); el.classList.remove('live-preview');
      });
    });
    document.querySelectorAll('[data-field]').forEach(el=>{
      el.addEventListener('change', async (e)=>{
        const dstr = e.target.getAttribute('data-date');
        const field = e.target.getAttribute('data-field');

        if((field==='checkIn' || field==='checkOut') && val!=='' && !isValidTime24(val)){
          e.target.classList.add('invalid'); return;
        }
        const data = getDayData(dstr);
        data[field] = val;
        await saveDay(dstr, data);
        render();
      });
    });
  }

  function renderCalendarPanel(){
    const y = state.calendarYear, m = state.calendarMonth;
    const nDays = daysInMonth(y,m);
    const firstDow = new Date(y, m-1, 1).getDay();
    const todayStr = dateKey(todayObj.getFullYear(), todayObj.getMonth()+1, todayObj.getDate());
    const eventDates = new Set(state.calendarEvents.map(e=> e.start_at.slice(0,10) ));

    let cells = '';
    for(let i=0;i<firstDow;i++) cells += `<div class="day empty"></div>`;
    for(let d=1; d<=nDays; d++){
      const dstr = dateKey(y,m,d);
      const cls = ['day'];
      if(dstr === state.calendarSelectedDate) cls.push('selected');
      if(dstr === todayStr) cls.push('today');
      if(eventDates.has(dstr)) cls.push('has-event');
      cells += `<div class="${cls.join(' ')}" data-date="${dstr}">${d}</div>`;
    }

    const selDate = state.calendarSelectedDate;
    const dayStart = new Date(selDate + 'T00:00:00');
    const dayEnd = new Date(selDate + 'T23:59:59');
    const dayEventsAll = state.calendarEvents.filter(e=>{
      const s = new Date(e.start_at), en = new Date(e.end_at);
      return s <= dayEnd && en >= dayStart;
    }).sort((a,b)=> new Date(a.start_at) - new Date(b.start_at));

    const allDayEvents = dayEventsAll.filter(e=>e.all_day);
    const timedEvents = dayEventsAll.filter(e=>!e.all_day);

    const hourRows = [];
    for(let h=0; h<24; h++){ hourRows.push(`<div class="cal-hour-row" style="top:${h*50}px;"><span class="cal-hour-label">${pad(h)}:00</span></div>`); }
    const pxPerMin = 50/60;
    const eventBars = timedEvents.map(e=>{
      const s = new Date(e.start_at), en = new Date(e.end_at);
      const clipStart = s < dayStart ? dayStart : s;
      const clipEnd = en > dayEnd ? dayEnd : en;
      const startMin = clipStart.getHours()*60 + clipStart.getMinutes();
      let endMin = clipEnd.getHours()*60 + clipEnd.getMinutes();
      if(endMin <= startMin) endMin = startMin + 20;
      const top = startMin * pxPerMin;
      const height = Math.max(22, (endMin - startMin) * pxPerMin);
      return `<div class="cal-event-bar" style="top:${top}px;height:${height}px;" data-event="${e.id}" title="${escapeHtml(e.title)}">
        ${escapeHtml(e.title)}${e.location ? `<span class="loc">${escapeHtml(e.location)}</span>` : ''}
      </div>`;
    }).join('');

    const allDayHtml = allDayEvents.length > 0 ? `
      <div class="cal-allday-section">
        ${allDayEvents.map(e=>`<span class="cal-allday-chip" data-event="${e.id}" title="클릭해서 삭제">종일 · ${escapeHtml(e.title)}${e.location ? ' · '+escapeHtml(e.location) : ''}</span>`).join('')}
      </div>
    ` : '';

    const listHtml = dayEventsAll.map(e=>calEventListItemHtml(e)).join('') || `<div class="todo-empty">이 날짜에 일정이 없어요.</div>`;

    return `
      <div class="card">
        <h2>캘린더</h2>
        <div class="month-nav" style="width:100%;justify-content:space-between;margin-bottom:10px;">
          <button id="cal-prev-month">‹</button>
          <span class="label mono">${y}년 ${m}월</span>
          <button id="cal-next-month">›</button>
        </div>
        <div class="mini-cal">
          ${DOW_LABEL.map(d=>`<div class="dow">${d}</div>`).join('')}
          ${cells}
        </div>

        <div class="cal-add-form">
          <div><label>제목</label><input type="text" id="evTitle" placeholder="일정 제목" maxlength="80"></div>
          <div><label>장소</label><input type="text" id="evLocation" placeholder="장소 (선택)" maxlength="80"></div>
          <div class="cal-allday-row"><input type="checkbox" id="evAllDay"><label for="evAllDay">종일</label></div>
          <div><label>시작</label><input type="datetime-local" id="evStart"></div>
          <div><label>종료</label><input type="datetime-local" id="evEnd"></div>
          <button class="btn-primary" id="evAddBtn">일정 추가</button>
        </div>

        <div class="cal-selected-label">${selDate} 일정</div>
        ${allDayHtml}
        <div class="cal-timeline" id="calTimeline">
          ${hourRows.join('')}
          ${eventBars}
        </div>
        <div class="cal-event-list">${listHtml}</div>
      </div>
    `;
  }

        if(!content) return;
        newItemAddBtn.disabled = true;
        await addTodoItem(state.todoActiveCatId, content, newItemDue.value);
        newItemAddBtn.disabled = false;
        render();
      }
      newItemAddBtn.addEventListener('click', doAddItem);
      newItemContent.addEventListener('keydown', e=>{ if(e.key==='Enter') doAddItem(); });
    }

    const calPrev = document.getElementById('cal-prev-month');
    const calNext = document.getElementById('cal-next-month');
    if(calPrev) calPrev.addEventListener('click', async ()=>{
      state.calendarMonth -= 1; if(state.calendarMonth<1){ state.calendarMonth=12; state.calendarYear-=1; }
      await loadCalendarEvents(); render();
    });
    if(calNext) calNext.addEventListener('click', async ()=>{
      state.calendarMonth += 1; if(state.calendarMonth>12){ state.calendarMonth=1; state.calendarYear+=1; }
      await loadCalendarEvents(); render();
    });

    document.querySelectorAll('.mini-cal .day[data-date]').forEach(el=>{
      el.addEventListener('click', ()=>{ state.calendarSelectedDate = el.getAttribute('data-date'); render(); });
    });

    const evTitle = document.getElementById('evTitle');
    const evLocation = document.getElementById('evLocation');
    const evAllDay = document.getElementById('evAllDay');
    const evStart = document.getElementById('evStart');
    const evEnd = document.getElementById('evEnd');
    const evAddBtn = document.getElementById('evAddBtn');
    if(evAddBtn){
      if(evStart && !evStart.value) evStart.value = `${state.calendarSelectedDate}T09:00`;
      if(evEnd && !evEnd.value) evEnd.value = `${state.calendarSelectedDate}T10:00`;

      evAllDay.addEventListener('change', ()=>{
        if(evAllDay.checked){
          const sDate = evStart.value ? evStart.value.slice(0,10) : state.calendarSelectedDate;
          const eDate = evEnd.value ? evEnd.value.slice(0,10) : state.calendarSelectedDate;
          evStart.type = 'date'; evStart.value = sDate;
          evEnd.type = 'date'; evEnd.value = eDate;
        } else {
          const sDate = evStart.value || state.calendarSelectedDate;
          const eDate = evEnd.value || state.calendarSelectedDate;
          evStart.type = 'datetime-local'; evStart.value = `${sDate}T09:00`;
          evEnd.type = 'datetime-local'; evEnd.value = `${eDate}T10:00`;
        }
      });

      evAddBtn.addEventListener('click', async ()=>{
        const title = evTitle.value.trim();
        if(!title || !evStart.value || !evEnd.value) return;
        const isAllDay = evAllDay.checked;
        let startIso, endIso, newDate;
        if(isAllDay){
          startIso = new Date(evStart.value + 'T00:00:00').toISOString();
          endIso = new Date(evEnd.value + 'T23:59:59').toISOString();
          newDate = evStart.value;
        } else {
          startIso = new Date(evStart.value).toISOString();
          endIso = new Date(evEnd.value).toISOString();
          newDate = evStart.value.slice(0,10);
        }
        evAddBtn.disabled = true;
        await addCalendarEvent(title, evLocation.value.trim(), startIso, endIso, isAllDay);
        evAddBtn.disabled = false;

        const [ny, nm] = newDate.split('-').map(Number);
        if(ny !== state.calendarYear || nm !== state.calendarMonth){
          state.calendarYear = ny; state.calendarMonth = nm;
          await loadCalendarEvents();
        }
        state.calendarSelectedDate = newDate;
        render();
      });
    }

    document.querySelectorAll('.cal-event-bar, .cal-allday-chip').forEach(el=>{
      el.addEventListener('click', ()=>{
        const id = el.getAttribute('data-event');
        if(id) deleteCalendarEvent(id);
      });
    });

    document.querySelectorAll('[data-ev-edit]').forEach(btn=>{
      btn.addEventListener('click', ()=>{ state.calendarEventEditing = btn.getAttribute('data-ev-edit'); render(); });
    });
    document.querySelectorAll('[data-ev-cancel]').forEach(btn=>{
      btn.addEventListener('click', ()=>{ state.calendarEventEditing = null; render(); });
    });
    document.querySelectorAll('[data-ev-delete]').forEach(btn=>{
      btn.addEventListener('click', ()=>{ deleteCalendarEvent(btn.getAttribute('data-ev-delete')); });
    });
    document.querySelectorAll('.ev-edit-allday').forEach(cb=>{
      cb.addEventListener('change', ()=>{
        const row = cb.closest('.cal-event-list-item');
        const startEl = row.querySelector('.ev-edit-start');
        const endEl = row.querySelector('.ev-edit-end');
        if(cb.checked){
          startEl.type = 'date'; startEl.value = startEl.value.slice(0,10);
          endEl.type = 'date'; endEl.value = endEl.value.slice(0,10);
        } else {
          const sDate = startEl.value || state.calendarSelectedDate;
          const eDate = endEl.value || state.calendarSelectedDate;
          startEl.type = 'datetime-local'; startEl.value = `${sDate}T09:00`;
          endEl.type = 'datetime-local'; endEl.value = `${eDate}T10:00`;
        }
      });
    });
    document.querySelectorAll('[data-ev-save]').forEach(btn=>{
      btn.addEventListener('click', async ()=>{
        const id = btn.getAttribute('data-ev-save');
        const row = btn.closest('.cal-event-list-item');
        const title = row.querySelector('.ev-edit-title').value.trim();
        const location = row.querySelector('.ev-edit-location').value.trim();
        const allDay = row.querySelector('.ev-edit-allday').checked;
        const startVal = row.querySelector('.ev-edit-start').value;
        const endVal = row.querySelector('.ev-edit-end').value;
        if(!title || !startVal || !endVal) return;
        let startIso, endIso;
        if(allDay){
          startIso = new Date(startVal + 'T00:00:00').toISOString();
          endIso = new Date(endVal + 'T23:59:59').toISOString();
        } else {
          startIso = new Date(startVal).toISOString();
          endIso = new Date(endVal).toISOString();
        }
        btn.disabled = true;
        await updateCalendarEvent(id, { title, location: location || null, all_day: allDay, start_at: startIso, end_at: endIso });
        await loadCalendarEvents();
        btn.disabled = false;
        state.calendarEventEditing = null;
        render();
      });
    });
  }

  // ---------------- 렌더링: 전체 앱(탭 포함) ----------------

  function renderApp(){
    startLiveTick();
    document.getElementById('app').innerHTML = `
      <div class="header">
        <div>
          <h1>Aiden</h1>
          <div class="sub">${state.tab==='attendance' ? '출퇴근 시간을 입력하면 근무 현황이 자동으로 계산돼요' : '과제별로 할 일을 관리하고, 오른쪽 캘린더에 일정을 추가하세요'} · <span id="save-flag" class="save-flag">저장됨</span></div>
        </div>
        <div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap;">
          <div class="user-chip">${state.user.name}님 <button id="logoutBtn">로그아웃</button></div>
          ${state.tab==='attendance' ? `
          <div class="month-nav">
            <button id="prev-month">‹</button>
            <span class="label mono">${state.year}년 ${state.month}월</span>
            <button id="next-month">›</button>
          </div>` : ''}
        </div>
      </div>

      <div class="tab-nav">
        <button class="tab-btn ${state.tab==='attendance' ? 'active' : ''}" id="tabAttendance">근태 관리</button>
        <button class="tab-btn ${state.tab==='todo' ? 'active' : ''}" id="tabTodo">To do list</button>
      </div>

      <div id="tabContent">
        ${state.tab==='attendance' ? renderAttendanceHtml() : renderTodoHtml()}
      </div>
    `;

    document.getElementById('logoutBtn').onclick = logout;
    document.getElementById('tabAttendance').onclick = ()=>{ state.tab='attendance'; render(); };
    document.getElementById('tabTodo').onclick = ()=>{ state.tab='todo'; render(); };

    if(state.tab==='attendance') attachAttendanceHandlers();
    else attachTodoHandlers();
  }

  function render(){
    if(!state.user){
      if(state.authView === 'signup') renderSignup();
      else if(state.authView === 'changepin') renderChangePin();
      else renderLogin();
      return;
    }
    renderApp();
  }

  (async function init(){
    loadTodoPanelWidth();
    const session = loadSession();
    if(session && session.id){
      state.user = session;
      await Promise.all([loadMonth(), loadTodos(), loadCalendarEvents()]);
    }
    render();
  })();
})();
</script>
</body>
</html>
