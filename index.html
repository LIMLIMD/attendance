<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aiden</title>
<style>
  :root{
    --ink:#1B2430;
    --paper:#F3F6F5;
    --panel:#FFFFFF;
    --line:#DDE3E1;
    --accent:#0F6E5B;
    --accent-soft:#E4F1EC;
    --sat:#2B5FAD;
    --sun:#C0392B;
    --input-bg:#FFF3D6;
    --input-bg-hover:#FFE9B3;
    --plus:#0F6E5B;
    --minus:#C0392B;
    --amber:#E08E00;
    font-family:-apple-system,BlinkMacSystemFont,'Apple SD Gothic Neo','Malgun Gothic','Segoe UI',Roboto,'Noto Sans',sans-serif;
  }
  *{box-sizing:border-box;}
  body,#app{margin:0;color:var(--ink);}
  .mono{font-family:'IBM Plex Mono','SFMono-Regular',Consolas,monospace;font-variant-numeric:tabular-nums;}

  #app{background:var(--paper);padding:20px;min-height:100vh;}

  .header{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px;margin-bottom:12px;}
  .header h1{font-size:19px;font-weight:700;letter-spacing:-0.01em;margin:0;}
  .header .sub{font-size:12px;color:#6b7680;margin-top:2px;}

  .tab-nav{display:flex;gap:4px;background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:4px;margin-bottom:16px;width:fit-content;}
  .tab-btn{border:none;background:none;padding:8px 16px;border-radius:7px;font-size:13px;font-weight:700;color:#7a8389;cursor:pointer;}
  .tab-btn.active{background:var(--accent);color:#fff;}
  .tab-btn:hover:not(.active){background:var(--accent-soft);color:var(--accent);}

  .month-nav{display:flex;align-items:center;gap:6px;background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:4px 6px;}
  .month-nav button{border:none;background:none;font-size:15px;cursor:pointer;color:var(--accent);width:28px;height:28px;border-radius:6px;}
  .month-nav button:hover{background:var(--accent-soft);}
  .month-nav .label{font-weight:700;font-size:14px;padding:0 8px;min-width:84px;text-align:center;}

  .top-grid{display:grid;grid-template-columns:1fr 300px;gap:16px;align-items:start;}
  @media(max-width:900px){.top-grid{grid-template-columns:1fr;}}

  .card{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:14px 16px;}
  .card h2{font-size:12px;text-transform:uppercase;letter-spacing:.06em;color:#7a8389;margin:0 0 10px 0;font-weight:700;}

  .table-wrap{overflow-x:auto;border:1px solid var(--line);border-radius:12px;background:var(--panel);}
  table{border-collapse:collapse;width:100%;min-width:980px;font-size:12.5px;}
  thead th{position:sticky;top:0;background:#EEF2F1;border-bottom:1px solid var(--line);padding:8px 6px;font-weight:700;color:#3d474d;white-space:nowrap;text-align:center;}
  tbody td{padding:5px 6px;border-bottom:1px solid #EDF1EF;text-align:center;white-space:nowrap;}
  tbody tr:hover{background:#FAFBFA;}
  tbody tr.weekend-sat .date-cell{color:var(--sat);font-weight:700;}
  tbody tr.weekend-sun .date-cell{color:var(--sun);font-weight:700;}
  .date-cell{font-weight:600;}

  select.leave-input, input.time-input{
    border:1px solid #E8D48A;background:var(--input-bg);border-radius:6px;padding:4px 5px;font-size:12.5px;width:100%;text-align:center;
  }
  select.leave-input{width:82px;}
  input.time-input{width:78px;}
  input.time-input.invalid{border-color:var(--minus);background:#FFE1E1;}
  select.leave-input:hover, input.time-input:hover{background:var(--input-bg-hover);}
  select.leave-input:focus, input.time-input:focus{outline:2px solid var(--accent);outline-offset:1px;}
  input.time-input.live-preview{background:#D6EEF8;color:#98a3ab;border-color:#B9DCEB;}
  input.time-input.live-preview:hover{background:#c9e6f4;}

  .family-cell{background:#D6EEF8 !important;border-radius:4px;font-weight:700;color:#1B6E93;}
  .family-tag{font-size:9px;background:#D6EEF8;color:#1B6E93;border-radius:4px;padding:1px 4px;font-weight:700;vertical-align:middle;margin-left:2px;}

  .diff-pos{color:var(--plus);font-weight:700;}
  .diff-neg{color:var(--minus);font-weight:700;}
  .muted{color:#b7bec2;}

  tfoot td{padding:8px 6px;font-weight:700;background:#EEF2F1;border-top:1px solid var(--line);text-align:center;white-space:nowrap;}
  tfoot td.label-cell{text-align:left;}

  .summary-item{display:flex;justify-content:space-between;align-items:baseline;padding:8px 0;border-bottom:1px solid #F0F2F1;font-size:13px;}
  .summary-item:last-child{border-bottom:none;}
  .summary-item .label{color:#5a6469;}
  .summary-item .val{font-weight:700;}

  .balance-wrap{margin-top:10px;}
  .balance-track{position:relative;height:10px;border-radius:6px;background:#E7ECEA;overflow:hidden;}
  .balance-fill{position:absolute;top:0;bottom:0;border-radius:6px;transition:width .4s ease;}
  .balance-fill.pos{background:var(--plus);left:50%;}
  .balance-fill.neg{background:var(--minus);right:50%;}
  .balance-center{position:absolute;left:50%;top:-3px;bottom:-3px;width:2px;background:#c7cdcb;}
  .balance-label{margin-top:6px;font-size:12px;color:#5a6469;display:flex;justify-content:space-between;}

  .legend{font-size:11px;color:#8b9298;margin-top:10px;line-height:1.6;}
  .legend b{color:#5a6469;}

  .save-flag{font-size:11px;color:var(--accent);opacity:0;transition:opacity .3s;}
  .save-flag.show{opacity:1;}

  .user-chip{display:flex;align-items:center;gap:8px;background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:6px 10px;font-size:12.5px;font-weight:600;}
  .user-chip button{border:none;background:#EEF2F1;color:#54606a;font-size:11px;font-weight:700;border-radius:6px;padding:5px 8px;cursor:pointer;}
  .user-chip button:hover{background:#e2e8e6;}

  .login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;}
  .login-card{background:var(--panel);border:1px solid var(--line);border-radius:16px;padding:32px 28px;width:100%;max-width:340px;}
  .login-card h1{font-size:20px;margin:0 0 4px 0;}
  .login-card .desc{font-size:12.5px;color:#6b7680;margin-bottom:20px;line-height:1.5;}
  .login-field{margin-bottom:12px;}
  .login-field label{display:block;font-size:12px;font-weight:700;color:#54606a;margin-bottom:5px;}
  .login-field input{width:100%;border:1px solid var(--line);border-radius:8px;padding:10px 12px;font-size:14px;}
  .login-field input:focus{outline:2px solid var(--accent);outline-offset:1px;}
  .login-btn{width:100%;border:none;background:var(--accent);color:#fff;font-weight:700;font-size:14px;border-radius:8px;padding:11px 0;cursor:pointer;margin-top:6px;}
  .login-btn:hover{background:#0b5a4a;}
  .login-btn:disabled{background:#b7c3bf;cursor:default;}
  .login-error{font-size:12.5px;color:var(--minus);margin-top:10px;min-height:16px;}
  .login-switch{font-size:12.5px;color:#6b7680;margin-top:14px;text-align:center;}
  .login-switch a{color:var(--accent);font-weight:700;text-decoration:none;}
  .login-switch a:hover{text-decoration:underline;}
  .login-hint{font-size:11px;color:#8b9298;margin-top:16px;line-height:1.6;}

  .btn-primary{border:none;border-radius:7px;padding:8px 14px;font-size:12.5px;font-weight:700;cursor:pointer;background:var(--accent);color:#fff;white-space:nowrap;}
  .btn-primary:hover{background:#0b5a4a;}
  .btn-primary:disabled{background:#b7c3bf;cursor:default;}

  .todo-cat-list{display:flex;flex-direction:column;gap:12px;}
  .todo-row{display:grid;grid-template-columns:34px 132px 1fr 30px;gap:8px;align-items:center;padding:7px 2px;border-bottom:1px solid #EEF1F0;}
  .todo-row:last-child{border-bottom:none;}
  .todo-row input[type=date]{border:1px solid var(--line);border-radius:6px;padding:5px 6px;font-size:12px;width:100%;color:var(--ink);}
  .todo-row input[type=text]{border:1px solid var(--line);border-radius:6px;padding:6px 8px;font-size:13px;width:100%;}
  .todo-row input[type=text]:focus, .todo-row input[type=date]:focus{outline:2px solid var(--accent);outline-offset:1px;}
  .todo-row input.todo-content-input.done{text-decoration:line-through;color:#b7bec2;}
  .todo-empty{font-size:12.5px;color:#8b9298;padding:10px 2px;}
  .todo-delete{border:none;background:none;color:#c7cdcb;font-size:16px;cursor:pointer;width:28px;height:28px;border-radius:6px;line-height:1;}
  .todo-delete:hover{background:#FFE1E1;color:var(--minus);}

  .status-toggle{width:26px;height:26px;border-radius:50%;border:2px solid #c7cdcb;background:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:800;color:transparent;padding:0;}
  .status-toggle.status-in_progress{background:var(--amber);border-color:var(--amber);color:#fff;}
  .status-toggle.status-done{background:var(--accent);border-color:var(--accent);color:#fff;}

  .new-cat-row{display:flex;gap:8px;}
  .new-cat-row input{flex:1;border:1px solid var(--line);border-radius:8px;padding:9px 12px;font-size:13.5px;}
  .new-cat-row input:focus{outline:2px solid var(--accent);outline-offset:1px;}
</style>
</head>
<body>

<div id="app"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
(function(){
  // ---- Supabase 연결 정보 ----
  const SUPABASE_URL = 'https://tpjxiealovjlmyeqmupq.supabase.co';
  const SUPABASE_ANON_KEY = 'sb_publishable_r5uArNLj0P4TBk8rPUnqqQ_hf-T2ZEC';

  const supabase = (SUPABASE_URL.startsWith('http'))
    ? window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY)
    : null;

  const LEAVE_MIN = { none:0, full:480, half:240, quarter:120 };
  const LEAVE_LABEL = { none:'없음', full:'연차', half:'반차', quarter:'반반차' };
  const MEAL_RATE = 9000;
  const SESSION_KEY = 'att_session_v1';
  const STATUS_ORDER = ['pending','in_progress','done'];
  const STATUS_ICON = { pending:'', in_progress:'●', done:'✓' };

  let state = {
    year: 2026,
    month: 7,
    days: {},
    user: null,   // { id, name }
    authView: 'login', // 'login' | 'signup' | 'changepin'
    loginError: '',
    signupError: '',
    changePinError: '',
    tab: 'attendance', // 'attendance' | 'todo'
    todoCategories: [],
    todoItems: []
  };

  const todayObj = new Date();
  state.year = todayObj.getFullYear();
  state.month = todayObj.getMonth() + 1;

  function pad(n){ return String(n).padStart(2,'0'); }
  function monthKey(y,m){ return `${y}-${pad(m)}`; }
  function dateKey(y,m,d){ return `${y}-${pad(m)}-${pad(d)}`; }
  function daysInMonth(y,m){ return new Date(y, m, 0).getDate(); }

  function timeToMin(t){ if(!t) return null; const p = t.split(':'); if(p.length<2) return null; const h=Number(p[0]), mi=Number(p[1]); if(isNaN(h)||isNaN(mi)) return null; return h*60+mi; }
  function isValidTime24(v){ return /^([01][0-9]|2[0-3]):[0-5][0-9]$/.test(v); }
  function minToStr(mins, withSign){
    if(mins===null || mins===undefined || isNaN(mins)) return '';
    const sign = mins<0 ? '-' : (withSign ? '+' : '');
    const abs = Math.round(Math.abs(mins));
    const h = Math.floor(abs/60), m = abs%60;
    return `${sign}${h}:${pad(m)}`;
  }
  function planMinutes(dow){ return (dow>=1 && dow<=5) ? 480 : 0; }

  function nowTimeStr(){
    const n = new Date();
    return pad(n.getHours()) + ':' + pad(n.getMinutes());
  }
  function effectiveDayData(data){
    if(data.checkIn && !data.checkOut){
      return { leave: data.leave, checkIn: data.checkIn, checkOut: nowTimeStr(), _live: true };
    }
    return data;
  }

  // ---------------- Auth ----------------

  function loadSession(){
    try{
      const raw = localStorage.getItem(SESSION_KEY);
      if(raw) return JSON.parse(raw);
    }catch(e){ /* ignore */ }
    return null;
  }
  function saveSession(user){
    try{ localStorage.setItem(SESSION_KEY, JSON.stringify(user)); }catch(e){ /* ignore */ }
  }
  function clearSession(){
    try{ localStorage.removeItem(SESSION_KEY); }catch(e){ /* ignore */ }
  }

  async function login(name, pin){
    if(!supabase) return { ok:false, message:'Supabase 연결 정보가 설정되지 않았어요.' };
    if(!name){ return { ok:false, message:'이름을 입력해주세요.' }; }
    if(!/^\d{4}$/.test(pin)){ return { ok:false, message:'PIN은 숫자 4자리로 입력해주세요.' }; }

    const { data: existing, error } = await supabase
      .from('att_users').select('id,name,pin').eq('name', name).limit(1);
    if(error) return { ok:false, message:'서버 연결에 실패했어요. 잠시 후 다시 시도해주세요.' };

    if(!existing || existing.length === 0){
      return { ok:false, message:'등록되지 않은 이름이에요. 아래 "회원가입"으로 먼저 계정을 만들어주세요.' };
    }
    const row = existing[0];
    if(row.pin !== pin){
      return { ok:false, message:'PIN이 올바르지 않아요.' };
    }
    return { ok:true, user:{ id: row.id, name: row.name } };
  }

  async function register(name, pin, pinConfirm){
    if(!supabase) return { ok:false, message:'Supabase 연결 정보가 설정되지 않았어요.' };
    if(!name){ return { ok:false, message:'이름을 입력해주세요.' }; }
    if(!/^\d{4}$/.test(pin)){ return { ok:false, message:'PIN은 숫자 4자리로 입력해주세요.' }; }
    if(pin !== pinConfirm){ return { ok:false, message:'PIN이 서로 일치하지 않아요. 다시 확인해주세요.' }; }

    const { data: existing, error } = await supabase
      .from('att_users').select('id').eq('name', name).limit(1);
    if(error) return { ok:false, message:'서버 연결에 실패했어요. 잠시 후 다시 시도해주세요.' };
    if(existing && existing.length > 0){
      return { ok:false, message:'이미 사용 중인 이름이에요. 동명이인이라면 이름을 다르게 등록해주세요 (예: 홍길동2). 이미 등록한 계정이라면 로그인해주세요.' };
    }

    const { data: created, error: insErr } = await supabase
      .from('att_users').insert({ name, pin }).select('id,name').single();
    if(insErr) return { ok:false, message:'계정 생성에 실패했어요. 잠시 후 다시 시도해주세요.' };
    return { ok:true, user:{ id: created.id, name: created.name } };
  }

  async function changePin(name, oldPin, newPin, newPinConfirm){
    if(!supabase) return { ok:false, message:'Supabase 연결 정보가 설정되지 않았어요.' };
    if(!name){ return { ok:false, message:'이름을 입력해주세요.' }; }
    if(!/^\d{4}$/.test(oldPin)){ return { ok:false, message:'기존 PIN은 숫자 4자리로 입력해주세요.' }; }
    if(!/^\d{4}$/.test(newPin)){ return { ok:false, message:'변경할 PIN은 숫자 4자리로 입력해주세요.' }; }
    if(newPin !== newPinConfirm){ return { ok:false, message:'변경할 PIN이 서로 일치하지 않아요. 다시 확인해주세요.' }; }
    if(oldPin === newPin){ return { ok:false, message:'기존 PIN과 다른 값으로 설정해주세요.' }; }

    const { data: existing, error } = await supabase
      .from('att_users').select('id,pin').eq('name', name).limit(1);
    if(error) return { ok:false, message:'서버 연결에 실패했어요. 잠시 후 다시 시도해주세요.' };
    if(!existing || existing.length === 0){
      return { ok:false, message:'등록되지 않은 이름이에요.' };
    }
    const row = existing[0];
    if(row.pin !== oldPin){
      return { ok:false, message:'기존 PIN이 올바르지 않아요.' };
    }

    const { error: updErr } = await supabase.from('att_users').update({ pin: newPin }).eq('id', row.id);
    if(updErr) return { ok:false, message:'PIN 변경에 실패했어요. 잠시 후 다시 시도해주세요.' };
    return { ok:true, user:{ id: row.id, name } };
  }

  function logout(){
    clearSession();
    state.user = null;
    state.days = {};
    state.todoCategories = [];
    state.todoItems = [];
    render();
  }

  // ---------------- 근태 데이터 ----------------

  async function loadMonth(){
    state.days = {};
    if(!supabase || !state.user) return;
    const first = dateKey(state.year, state.month, 1);
    const last = dateKey(state.year, state.month, daysInMonth(state.year, state.month));
    const { data, error } = await supabase
      .from('att_days')
      .select('date_key,leave,check_in,check_out')
      .eq('user_id', state.user.id)
      .gte('date_key', first)
      .lte('date_key', last);
    if(!error && data){
      data.forEach(row=>{
        state.days[row.date_key] = { leave: row.leave, checkIn: row.check_in || '', checkOut: row.check_out || '' };
      });
    }
  }

  async function saveDay(dstr, data){
    if(!supabase || !state.user) return;
    const { error } = await supabase.from('att_days').upsert({
      user_id: state.user.id,
      date_key: dstr,
      leave: data.leave,
      check_in: data.checkIn,
      check_out: data.checkOut,
      updated_at: new Date().toISOString()
    }, { onConflict: 'user_id,date_key' });
    if(!error) flashSave();
    else console.error('save failed', error);
  }

  function getDayData(dstr){
    if(!state.days[dstr]) state.days[dstr] = { leave:'none', checkIn:'', checkOut:'' };
    return state.days[dstr];
  }

  function isFamilyDay(y, m, d){
    const dow = new Date(y, m-1, d).getDay();
    if(dow !== 5) return false;
    return Math.ceil(d/7) === 4;
  }

  function computeDay(dow, data, familyDay){
    const plan = planMinutes(dow);
    const leaveMin = LEAVE_MIN[data.leave || 'none'] || 0;
    const inM = timeToMin(data.checkIn);
    const outM = timeToMin(data.checkOut);
    let dur=null, lunch=0, dinner=0, actual=null;
    if(inM!=null && outM!=null){
      dur = outM - inM;
      if(dur < 0) dur += 24*60;
      const outAdj = outM < inM ? outM + 24*60 : outM;
      const overlapStart = Math.max(inM, 11*60+30);
      const overlapEnd = Math.min(outAdj, 12*60+30);
      lunch = Math.max(0, overlapEnd - overlapStart);
      dinner = dur >= (11*60+30) ? 30 : 0;
      const base = dur - lunch - dinner;
      if(familyDay){
        if(base <= 4*60) actual = base + 4*60;
        else if(base <= 8*60) actual = 8*60;
        else actual = base;
      } else {
        actual = base;
      }
    }
    const holidayWork = (plan===0 && actual!=null) ? actual : 0;
    const isHolidayWorkDay = plan===0 && actual!=null;
    const statusCounts = !isHolidayWorkDay && (actual!=null || leaveMin>0);
    const dailyDiff = statusCounts ? (actual||0) + leaveMin - plan : 0;
    return { plan, dur, lunch, dinner, actual, leaveMin, holidayWork, statusCounts, dailyDiff };
  }

  // ---------------- To do 데이터 ----------------

  async function loadTodos(){
    state.todoCategories = [];
    state.todoItems = [];
    if(!supabase || !state.user) return;
    const { data: cats } = await supabase
      .from('todo_categories').select('id,name,sort_order')
      .eq('user_id', state.user.id).order('sort_order', { ascending:true });
    state.todoCategories = cats || [];
    const { data: items } = await supabase
      .from('todo_items').select('id,category_id,content,due_date,status')
      .eq('user_id', state.user.id);
    state.todoItems = items || [];
  }

  async function addCategory(name){
    if(!supabase || !state.user || !name) return;
    const maxOrder = state.todoCategories.reduce((mx,c)=>Math.max(mx, c.sort_order||0), 0);
    const { data, error } = await supabase.from('todo_categories')
      .insert({ user_id: state.user.id, name, sort_order: maxOrder+1 })
      .select('id,name,sort_order').single();
    if(!error && data){ state.todoCategories.push(data); flashSave(); }
  }

  async function addTodoItem(categoryId, content, dueDate){
    if(!supabase || !state.user || !content) return;
    const { data, error } = await supabase.from('todo_items')
      .insert({ user_id: state.user.id, category_id: categoryId, content, due_date: dueDate || null, status:'pending' })
      .select('id,category_id,content,due_date,status').single();
    if(!error && data){ state.todoItems.push(data); flashSave(); }
  }

  async function updateTodoItem(itemId, fields){
    if(!supabase || !state.user) return;
    const item = state.todoItems.find(i=>i.id===itemId);
    if(!item) return;
    Object.assign(item, fields);
    const { error } = await supabase.from('todo_items')
      .update({ ...fields, updated_at: new Date().toISOString() })
      .eq('id', itemId);
    if(!error) flashSave();
  }

  async function deleteTodoItem(itemId){
    if(!supabase || !state.user) return;
    state.todoItems = state.todoItems.filter(i=>i.id!==itemId);
    render();

  function renderAttendanceHtml(){
    const y = state.year, m = state.month;
    const nDays = daysInMonth(y,m);
    const rows = [];
    let cumulative = 0;
    let totals = { plan:0, dur:0, lunch:0, dinner:0, actual:0, holiday:0, leave:0 };

    for(let d=1; d<=nDays; d++){
      const dstr = dateKey(y,m,d);
      const dow = new Date(y, m-1, d).getDay();
      const data = getDayData(dstr);
      const effData = effectiveDayData(data);
      const isLive = !!effData._live;
      const famDay = isFamilyDay(y, m, d);
      const c = computeDay(dow, effData, famDay);
      if(c.statusCounts) cumulative += c.dailyDiff;
      totals.plan += c.plan;
      totals.dur += (c.dur||0);
      totals.lunch += c.lunch;
      totals.dinner += c.dinner;
      totals.actual += (c.actual||0);
      totals.holiday += c.holidayWork;
      totals.leave += c.leaveMin;

      const rowClass = dow===6 ? 'weekend-sat' : (dow===0 ? 'weekend-sun' : '');
      const weekdayLabel = ['일','월','화','수','목','금','토'][dow];
      const tabIn = d*2 - 1;
      const tabOut = d*2;

      rows.push(`
        <tr class="${rowClass}" data-date="${dstr}">
          <td class="date-cell mono">${d}일(${weekdayLabel})${famDay ? ' <span class="family-tag">FD</span>' : ''}</td>
          <td>
            <select class="leave-input" data-field="leave" data-date="${dstr}" tabindex="-1">
              ${Object.keys(LEAVE_MIN).map(k=>`<option value="${k}" ${data.leave===k?'selected':''}>${LEAVE_LABEL[k]}</option>`).join('')}
            </select>
          </td>
          <td class="mono">${c.plan>0 ? minToStr(c.plan) : '<span class="muted">-</span>'}</td>
          <td><input class="time-input" type="text" inputmode="numeric" placeholder="09:00" maxlength="5" data-field="checkIn" data-date="${dstr}" value="${data.checkIn||''}" tabindex="${tabIn}"></td>
          <td><input class="time-input${isLive ? ' live-preview' : ''}" type="text" inputmode="numeric" placeholder="18:00" maxlength="5" data-field="checkOut" data-date="${dstr}" value="${isLive ? effData.checkOut : (data.checkOut||'')}" tabindex="${tabOut}"></td>
          <td class="mono">${c.dur!=null ? minToStr(c.dur) : ''}</td>
          <td class="mono">${c.dur!=null ? minToStr(c.lunch) : ''}</td>
          <td class="mono">${c.dur!=null ? minToStr(c.dinner) : ''}</td>
          <td class="mono ${famDay ? 'family-cell' : ''}">${c.actual!=null ? minToStr(c.actual) : ''}</td>
          <td class="mono">${c.holidayWork>0 ? minToStr(c.holidayWork) : ''}</td>
          <td class="mono ${c.statusCounts ? (cumulative>=0?'diff-pos':'diff-neg') : ''}">${c.statusCounts ? minToStr(cumulative, true) : ''}</td>
        </tr>
      `);
    }

    const actualMonthTotal = totals.actual + totals.leave;
    const planMonthTotal = totals.plan;
    const compDays = (totals.holiday/480).toFixed(3);
    let dinnerDaysCount = 0;
    for(let d=1; d<=nDays; d++){
      const dstr2 = dateKey(y,m,d);
      const dow2 = new Date(y, m-1, d).getDay();
      const dd = computeDay(dow2, effectiveDayData(getDayData(dstr2)), isFamilyDay(y,m,d));
      if(dd.dinner>0) dinnerDaysCount++;
    }
    const mealTotal = dinnerDaysCount * MEAL_RATE;
    const balanceMinutes = cumulative;
    const balanceMax = 8*60*3;
    const pct = Math.max(-100, Math.min(100, (balanceMinutes/balanceMax)*100));

    return `
      <div class="top-grid">
        <div>
          <div class="card" style="margin-bottom:12px;">
            <h2>규칙</h2>
            <div class="legend">
              <b>규칙</b> · 점심휴게: 11:30~12:30 중 근무한 만큼만 자동 차감 (예: 11:53 출근 → 37분) · 저녁휴게: 체류시간 11:30 이상이면 30분 추가 차감(저녁식대 ₩${MEAL_RATE.toLocaleString()} 고정 지급) · 자정 넘겨 퇴근 시 24:00을 더해 계산 · <b>매월 4번째 금요일은 자동으로 패밀리데이</b>(하늘색 실제근로 칸)로 지정되어, (체류시간-점심휴게-저녁휴게)가 4:00 이하면 +4:00, 4:00~8:00이면 8:00으로 고정, 8:00 초과면 그대로 적용 · 근무 현황은 (실제근로+연차시간-계획근무)의 월 누적값이며, 계획근무가 없는 날(휴일)에 발생한 실제근로는 근무현황에 반영되지 않고 8시간=1일 기준으로 대체휴일에만 반영됨 · 출근만 입력되고 퇴근이 비어있으면 하늘색으로 지금 시각이 임시로 표시되며(저장은 안 됨), 직접 입력하면 확정 저장됩니다
            </div>
          </div>

          <div class="table-wrap">
            <table>
              <thead>
                <tr>
                  <th>날짜</th>
                  <th>연차or휴일</th>
                  <th>계획근무</th>
                  <th>출근</th>
                  <th>퇴근</th>
                  <th>체류시간</th>
                  <th>점심휴게</th>
                  <th>저녁휴게</th>
                  <th>실제근로</th>
                  <th>휴일근로</th>
                  <th>근무 현황</th>
                </tr>
              </thead>
              <tbody>
                ${rows.join('')}
              </tbody>
              <tfoot>
                <tr>
                  <td colspan="2" class="label-cell">합계</td>
                  <td class="mono">${minToStr(totals.plan)}</td>
                  <td colspan="2"></td>
                  <td class="mono">${minToStr(totals.dur)}</td>
                  <td class="mono">${minToStr(totals.lunch)}</td>
                  <td class="mono">${minToStr(totals.dinner)}</td>
                  <td class="mono">${minToStr(totals.actual)}</td>
                  <td class="mono">${minToStr(totals.holiday)}</td>
                  <td></td>
                </tr>
              </tfoot>
            </table>
          </div>
        </div>

        <div class="card">
          <h2>정산</h2>
          <div class="summary-item"><span class="label">월 근무시간 (실제)</span><span class="val mono">${minToStr(actualMonthTotal)}</span></div>
          <div class="summary-item"><span class="label">월 근무시간 (계획)</span><span class="val mono">${minToStr(planMonthTotal)}</span></div>
          <div class="summary-item"><span class="label">대체휴일</span><span class="val mono">${compDays}</span></div>
          <div class="summary-item"><span class="label">저녁식대</span><span class="val mono">₩${mealTotal.toLocaleString()}</span></div>

          <div class="balance-wrap">
            <div class="summary-item" style="border:none;padding-bottom:4px;"><span class="label">근무 밸런스</span><span class="val mono ${balanceMinutes>=0?'diff-pos':'diff-neg'}">${minToStr(balanceMinutes, true)}</span></div>
            <div class="balance-track">
              <div class="balance-center"></div>
              ${balanceMinutes>=0
                ? `<div class="balance-fill pos" style="width:${Math.abs(pct)/2}%;"></div>`
                : `<div class="balance-fill neg" style="width:${Math.abs(pct)/2}%;"></div>`}
            </div>
            <div class="balance-label"><span>부족</span><span>초과</span></div>
          </div>
        </div>
      </div>
    `;
  }

  function attachAttendanceHandlers(){
    document.getElementById('prev-month').onclick = async ()=>{
      state.month -= 1;
      if(state.month<1){ state.month=12; state.year -=1; }
      await loadMonth();
      render();
    };
    document.getElementById('next-month').onclick = async ()=>{
      state.month += 1;
      if(state.month>12){ state.month=1; state.year +=1; }
      await loadMonth();
      render();
    };

    document.querySelectorAll('input.time-input').forEach(el=>{
      el.addEventListener('focus', ()=>{ el.select(); });
      el.addEventListener('input', ()=>{
        let v = el.value.replace(/[^0-9]/g,'');
        if(v.length>4) v = v.slice(0,4);
        if(v.length>=3) v = v.slice(0,2)+':'+v.slice(2);
        el.value = v;
        el.classList.remove('invalid');
        el.classList.remove('live-preview');
      });
    });

    document.querySelectorAll('[data-field]').forEach(el=>{
      el.addEventListener('change', async (e)=>{
        const dstr = e.target.getAttribute('data-date');
        const field = e.target.getAttribute('data-field');
        const val = e.target.value;
        if((field==='checkIn' || field==='checkOut') && val!=='' && !isValidTime24(val)){
          e.target.classList.add('invalid');
          return;
        }
        const data = getDayData(dstr);
        data[field] = val;
        await saveDay(dstr, data);
        render();
      });
    });
  }

  function renderTodoHtml(){
    if(state.todoCategories.length === 0){
      return `
        <div class="card" style="margin-bottom:12px;">
          <h2>소분류 추가</h2>
          <div class="new-cat-row">
            <input type="text" id="newCategoryInput" placeholder="예: 프로젝트A" maxlength="40">

      `;
    }

    const cats = state.todoCategories.slice().sort((a,b)=>(a.sort_order||0)-(b.sort_order||0));
    const catBlocks = cats.map(cat=>{
      const items = state.todoItems
        .filter(i=>i.category_id === cat.id)
        .slice()
        .sort((a,b)=>{
          if(!a.due_date && !b.due_date) return 0;
          if(!a.due_date) return 1;
          if(!b.due_date) return -1;
          return a.due_date.localeCompare(b.due_date);
        });

      const itemRows = items.map(item=>`
        <div class="todo-row" data-item="${item.id}">
          <button class="status-toggle status-${item.status}" data-item="${item.id}" title="상태 변경">${STATUS_ICON[item.status]}</button>
          <input type="date" class="todo-due-edit" data-item="${item.id}" value="${item.due_date || ''}">
          <input type="text" class="todo-content-edit${item.status==='done' ? ' done' : ''}" data-item="${item.id}" value="${item.content.replace(/"/g,'&quot;')}" maxlength="200">
          <button class="todo-delete" data-item="${item.id}" title="삭제">×</button>
        </div>
      `).join('') || `<div class="todo-empty">할 일이 없어요.</div>`;

      return `
        <div class="card todo-category" data-cat="${cat.id}" style="margin-bottom:12px;">
          <h2>${cat.name}</h2>
          <div class="todo-cat-items">${itemRows}</div>

            <span></span>
            <input type="date" class="todo-due-input" data-cat="${cat.id}">
            <input type="text" class="todo-content-input" data-cat="${cat.id}" placeholder="할 일을 입력하고 Enter" maxlength="200">
            <button class="btn-primary todo-add-btn" data-cat="${cat.id}" style="padding:6px 10px;">추가</button>
          </div>
        </div>
      `;
    }).join('');

    return `
      <div class="card" style="margin-bottom:12px;">
        <h2>소분류 추가</h2>
        <div class="new-cat-row">
          <input type="text" id="newCategoryInput" placeholder="예: 프로젝트A" maxlength="40">
          <button id="addCategoryBtn" class="btn-primary">추가</button>
        </div>
      </div>
      <div class="todo-cat-list">${catBlocks}</div>
    `;
  }

      addCatBtn.disabled = false;

      el.addEventListener('change', async ()=>{
        const id = el.getAttribute('data-item');
        await updateTodoItem(id, { due_date: el.value || null });
        render();
      });
    });

    document.querySelectorAll('.todo-content-edit').forEach(el=>{
      el.addEventListener('change', async ()=>{
        const id = el.getAttribute('data-item');
        const val = el.value.trim();
        if(!val) return;
        await updateTodoItem(id, { content: val });
        render();
      });
    });

    document.querySelectorAll('.todo-delete').forEach(btn=>{
      btn.addEventListener('click', ()=>{
        const id = btn.getAttribute('data-item');
        deleteTodoItem(id);
      });
    });

    document.querySelectorAll('.todo-add-btn').forEach(btn=>{
      const catId = btn.getAttribute('data-cat');
      const contentEl = document.querySelector(`.todo-content-input[data-cat="${catId}"]`);
      const dueEl = document.querySelector(`.todo-due-input[data-cat="${catId}"]`);
      async function doAdd(){
        const content = contentEl.value.trim();
        if(!content) return;
        btn.disabled = true;
        await addTodoItem(catId, content, dueEl.value);
        btn.disabled = false;
        render();
      }
      btn.addEventListener('click', doAdd);
      contentEl.addEventListener('keydown', e=>{ if(e.key==='Enter') doAdd(); });
    });
  }

  // ---------------- 렌더링: 전체 앱(탭 포함) ----------------

  function renderApp(){
    startLiveTick();
    document.getElementById('app').innerHTML = `
      <div class="header">
        <div>
          <h1>Aiden</h1>
          <div class="sub">${state.tab==='attendance' ? '출퇴근 시간을 입력하면 근무 현황이 자동으로 계산돼요' : '소분류별로 할 일을 관리하세요'} · <span id="save-flag" class="save-flag">저장됨</span></div>
        </div>
        <div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap;">
          <div class="user-chip">${state.user.name}님 <button id="logoutBtn">로그아웃</button></div>
          ${state.tab==='attendance' ? `
          <div class="month-nav">
            <button id="prev-month">‹</button>
            <span class="label mono">${state.year}년 ${state.month}월</span>
            <button id="next-month">›</button>
          </div>` : ''}
        </div>
      </div>

      <div class="tab-nav">
        <button class="tab-btn ${state.tab==='attendance' ? 'active' : ''}" id="tabAttendance">근태 관리</button>
        <button class="tab-btn ${state.tab==='todo' ? 'active' : ''}" id="tabTodo">To do list</button>
      </div>

      <div id="tabContent">
        ${state.tab==='attendance' ? renderAttendanceHtml() : renderTodoHtml()}
      </div>
    `;

    document.getElementById('logoutBtn').onclick = logout;
    document.getElementById('tabAttendance').onclick = ()=>{ state.tab='attendance'; render(); };
    document.getElementById('tabTodo').onclick = ()=>{ state.tab='todo'; render(); };

    if(state.tab==='attendance') attachAttendanceHandlers();
    else attachTodoHandlers();
  }

  function render(){
    if(!state.user){
      if(state.authView === 'signup') renderSignup();
      else if(state.authView === 'changepin') renderChangePin();
      else renderLogin();
      return;
    }
    renderApp();
  }

  (async function init(){
    const session = loadSession();
    if(session && session.id){
      state.user = session;
      await Promise.all([loadMonth(), loadTodos()]);
    }
    render();
  })();
})();
</script>
</body>
</html>
